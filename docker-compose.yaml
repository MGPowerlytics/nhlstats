x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-nhlstats-airflow:local}
  build:
    context: .
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__API__SECRET_KEY: 'uTLxqlI0tqsZA6D9fe1QfQ=='
    AIRFLOW__API_AUTH__JWT_SECRET: 'McEiFikNUc268Nyy/iKRaA=='
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    # yamllint disable rule:line-length
    # Use simple http server on scheduler for health checks
    # See https://airflow.apache.org/docs/apache-airflow/stable/administration-and-deployment/logging-monitoring/check-health.html#scheduler-health-check-server
    # yamllint enable rule:line-length
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Gmail SMTP for email/SMS notifications
    AIRFLOW__SMTP__SMTP_HOST: 'smtp.gmail.com'
    AIRFLOW__SMTP__SMTP_STARTTLS: 'true'
    AIRFLOW__SMTP__SMTP_SSL: 'false'
    AIRFLOW__SMTP__SMTP_PORT: '587'
    AIRFLOW__SMTP__SMTP_USER: ${GMAIL_USER:-}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${GMAIL_USER:-}
    # PostgreSQL connection for app database
    POSTGRES_HOST: 'postgres'
    POSTGRES_PORT: '5432'
    POSTGRES_DB: 'airflow'
    POSTGRES_USER: 'airflow'
    POSTGRES_PASSWORD: 'airflow'
    KALSHI_API_KEY_ID: ${KALSHI_API_KEY_ID:?KALSHI_API_KEY_ID is required}
    KALSHI_PRIVATE_KEY_PATH: /run/secrets/kalshi_private_key.pem
    ODDS_API_KEY: ${ODDS_API_KEY:-}
    # The following line can be used to set a custom config file, stored in the local config folder
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    PYTHONPATH: '/opt/airflow/plugins:/opt/airflow'
  volumes:
    - airflow-logs:/opt/airflow/logs
    - ./data:/opt/airflow/data:rw
  secrets:
    - source: kalshi_private_key
      target: kalshi_private_key.pem
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  redis:
    # Redis is limited to 7.2-bookworm due to licencing change
    # https://redis.io/blog/redis-adopts-dual-source-available-licensing/
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always

  airflow-preflight:
    <<: *airflow-common
    command:
      - python
      - /opt/airflow/scripts/airflow_bootstrap.py
      - preflight
      - --migration-dir
      - /opt/airflow/migrations/stats_schema
      - --pool-config
      - /opt/airflow/config/airflow_pools.json
    user: "0:0"
    depends_on:
      <<: *airflow-common-depends-on

  airflow-bootstrap-admin:
    <<: *airflow-common
    command:
      - python
      - /opt/airflow/scripts/airflow_bootstrap.py
      - bootstrap-admin
      - --migration-dir
      - /opt/airflow/migrations/stats_schema
      - --pool-config
      - /opt/airflow/config/airflow_pools.json
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-change-me}
      _AIRFLOW_WWW_USER_FIRSTNAME: ${_AIRFLOW_WWW_USER_FIRSTNAME:-Airflow}
      _AIRFLOW_WWW_USER_LASTNAME: ${_AIRFLOW_WWW_USER_LASTNAME:-Admin}
      _AIRFLOW_WWW_USER_EMAIL: ${_AIRFLOW_WWW_USER_EMAIL:-airflow@example.com}
    depends_on:
      <<: *airflow-common-depends-on
      airflow-preflight:
        condition: service_completed_successfully

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-bootstrap-admin:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-bootstrap-admin:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-bootstrap-admin:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      # yamllint disable rule:line-length
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      # Required to handle warm shutdown of the celery workers properly
      # See https://airflow.apache.org/docs/docker-stack/entrypoint.html#signal-propagation
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-bootstrap-admin:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-bootstrap-admin:
        condition: service_completed_successfully

  airflow-watchdog:
    <<: *airflow-common
    command:
      - python
      - /opt/airflow/scripts/airflow_watchdog.py
      - --interval-seconds
      - "300"
    environment:
      <<: *airflow-common-env
      AIRFLOW_WATCHDOG_DAGS: "multi_sport_betting_workflow,bet_sync_hourly,portfolio_hourly_snapshot,historical_stats_daily"
      AIRFLOW_WATCHDOG_GRACE_MINUTES: "20"
      AIRFLOW_WATCHDOG_API_URL: "http://airflow-apiserver:8080/api/v2/version"
      AIRFLOW_WATCHDOG_SCHEDULER_URL: "http://airflow-scheduler:8974/health"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "/opt/airflow/scripts/airflow_watchdog.py"
        - "--once"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-scheduler:
        condition: service_healthy
      airflow-bootstrap-admin:
        condition: service_completed_successfully

  airflow-verify:
    <<: *airflow-common
    command:
      - python
      - /opt/airflow/scripts/airflow_bootstrap.py
      - verify
      - --migration-dir
      - /opt/airflow/migrations/stats_schema
      - --pool-config
      - /opt/airflow/config/airflow_pools.json
    depends_on:
      <<: *airflow-common-depends-on
      airflow-bootstrap-admin:
        condition: service_completed_successfully
      airflow-apiserver:
        condition: service_healthy
      airflow-scheduler:
        condition: service_healthy

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    # Workaround for entrypoint issue. See: https://github.com/apache/airflow/issues/16252
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on
      airflow-bootstrap-admin:
        condition: service_completed_successfully

  # You can enable flower by adding "--profile flower" option e.g. docker-compose --profile flower up
  # or by explicitly targeted on the command line e.g. docker-compose up flower.
  # See: https://docs.docker.com/compose/profiles/
  flower:
    <<: *airflow-common
    command: celery flower
    profiles:
      - flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-bootstrap-admin:
        condition: service_completed_successfully

  # Postfix relay no longer needed - using Gmail SMTP directly
  # postfix:
  #   image: boky/postfix:latest
  #   environment:
  #     ALLOWED_SENDER_DOMAINS: "nhlstats.local"
  #     ALLOW_EMPTY_SENDER_DOMAINS: "true"
  #   ports:
  #     - "1025:587"  # SMTP server
  #   restart: always

  dashboard:
    image: ${AIRFLOW_IMAGE_NAME:-nhlstats-airflow:local}
    build:
      context: .
    entrypoint: /bin/bash
    command: -c "streamlit run /opt/airflow/dashboard/dashboard_app.py --server.address=0.0.0.0 --server.fileWatcherType=none"
    ports:
      - "8501:8501"
    working_dir: /opt/airflow
    environment:
      - PYTHONPATH=/opt/airflow/plugins:/opt/airflow
      - PYTHONUNBUFFERED=1
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=airflow
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
    depends_on:
      postgres:
        condition: service_healthy
      airflow-bootstrap-admin:
        condition: service_completed_successfully
    restart: always

volumes:
  airflow-logs:
  postgres-db-volume:

secrets:
  kalshi_private_key:
    file: ${KALSHI_PRIVATE_KEY_FILE:?KALSHI_PRIVATE_KEY_FILE must point to a valid PEM private key on the host}
