prd_id: 2026-05-12-betting-pipeline-implementation
version: 3.0.1
status: complete

user_stories:
  - as_a: betting system owner
    i_want: the approved betting pipeline specs implemented in runtime paths
    so_that: long-term ROI can improve without weakening drawdown controls
  - as_a: model and risk maintainer
    i_want: probability, pricing, risk, and evidence contracts enforced consistently
    so_that: approvals and parameter changes are evidence-based instead of ROI-driven
  - as_a: engineering lead
    i_want: a concise implementation-cycle source of truth
    so_that: backlog execution stays aligned with the completed audit package

scope:
  in_scope:
    - Implement runtime hardening from the completed audit/spec package using the governed probability, pricing/CLV, portfolio-risk, and evidence/read-model contracts.
    - Execute the approved implementation backlog items: probability-pipeline-hardening, pricing-execution-hardening, risk-control-hardening, sport-validation-framework, portfolio-drawdown-gate, and runtime-docs-and-final-gate.
    - Enforce evidence-qualified runtime behavior for supported sports: NBA, NHL, MLB, NFL, EPL, LIGUE1, NCAAB, WNCAAB, and TENNIS.
    - Ship portfolio-level validation, concentration, drawdown, and risk-of-ruin gating that matches the approved roadmap.
    - Update durable runtime documentation and the final approval gate after implementation parity is verified.
  out_of_scope:
    - Net-new sportsbook or exchange integrations.
    - Dashboard or UX redesign work unrelated to governed runtime behavior or approval evidence.
    - Any bankroll, Kelly, max-risk, or threshold change that lacks CLV, calibration, and walk-forward evidence.
    - Replacing the approved contracts or roadmap without a new approval cycle.

acceptance_criteria:
  - criterion: Governed probability and calibration semantics are implemented in live selection, persistence, and downstream read paths.
    verification: Supported sports emit contract-aligned probability artifacts or explicit candidate, shadow, or blocked states across runtime and reporting surfaces.
  - criterion: Pricing, fair-odds, and CLV behavior is canonical across execution and evidence layers.
    verification: Reference pricing, executable pricing, and closing-line evidence use one approved pricing/CLV contract with no competing runtime implementations.
  - criterion: Portfolio risk controls enforce evidence-qualified sizing and exposure behavior.
    verification: Runtime concentration, drawdown, and exposure controls align with the approved portfolio-risk contract and reject unsupported parameter changes.
  - criterion: Sport-level validation outputs are operationalized across all supported sports.
    verification: Comparable evidence-tier outputs, approval states, and parity checks exist for NBA, NHL, MLB, NFL, EPL, LIGUE1, NCAAB, WNCAAB, and TENNIS.
  - criterion: Portfolio drawdown gating blocks unsafe recommendations at the portfolio level.
    verification: Unsafe recommendations are blocked when drawdown, concentration, or risk-of-ruin evidence fails, even if single-sport metrics appear strong.
  - criterion: Durable documentation reflects implemented behavior before final approval.
    verification: Runtime docs and the final approval package describe actual governed behavior and include evidence-backed eligibility states and blocked recommendations.

needs_clarification: []

features:
  - name: Probability pipeline hardening
    overview: Implement governed probability and calibration wiring across live selection, persistence, and downstream consumers.
    status: done
  - name: Pricing execution hardening
    overview: Implement canonical pricing, fair-odds, and CLV behavior across market ingestion, execution decisions, and evidence capture.
    status: done
  - name: Risk control hardening
    overview: Implement evidence-qualified portfolio risk controls for sizing, concentration, and exposure handling.
    status: done
  - name: Sport validation framework
    overview: Operationalize sport-by-sport validation outputs, evidence tiers, and approval-state parity checks.
    status: done
  - name: Portfolio drawdown gate
    overview: Implement portfolio-level drawdown and risk-of-ruin gating across runtime and reporting layers.
    status: done
  - name: Runtime docs and final gate
    overview: Align durable documentation and final approval artifacts with verified implemented behavior.
    status: done

decisions:
  - decision: The prior audit/spec package is complete and now serves as input to this implementation cycle.
  - decision: This PRD is the source of truth for the implementation cycle.
  - decision: Runtime work must stay grounded in the approved governed contracts for probability, pricing/CLV, portfolio risk, and evidence/read models.
  - decision: PostgreSQL-backed evidence and read models remain the verification truth for runtime approval.
  - decision: Supported sports remain NBA, NHL, MLB, NFL, EPL, LIGUE1, NCAAB, WNCAAB, and TENNIS.
  - decision: No bankroll, Kelly, or threshold sizing recommendation may be advanced without CLV, calibration, and walk-forward evidence.
  - decision: Runtime documentation and final approval occur only after implementation parity is verified.

changes:
  - version: 3.0.1
    change: Closed the implementation cycle after shipping the explicit governed drawdown guardrail, validating operator/runtime parity, and passing the final governance review gate.
  - version: 3.0.0
    change: Completed the prior audit/planning package and moved the repository into the implementation cycle, making the approved runtime hardening backlog active PRD scope.
  - version: 2.1.1
    change: Marked the audit/spec/roadmap package complete for this round and confirmed implementation remains deferred to a later execution cycle.
  - version: 2.1.0
    change: Recorded approval of the canonical audit/spec-only plan structure, deferred follow-on runtime backlog, and evidence-gated sizing decision after plan review.
  - version: 2.0.0
    change: Replaced the prior EPL contract-testing PRD with a concise source-of-truth PRD for the 2026-05-12 multi-sport betting pipeline audit and implementation-planning engagement.
