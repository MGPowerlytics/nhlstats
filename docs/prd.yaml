prd_id: remediation-20260420-085817
version: 1.0.0
status: final
plan_status: ready_for_approval

user_stories:
  - as_a: platform owner
    i_want: a prioritized remediation plan for the highest-risk operational gaps
    so_that: the system can stay operational without accumulating hidden security, schema, and runtime risk
  - as_a: maintainer
    i_want: one agreed remediation scope across security, database, CI, runtime, and docs
    so_that: planning and execution can proceed without conflicting assumptions
  - as_a: Airflow operator
    i_want: clear remediation requirements for environment completeness and runbook parity
    so_that: DAGs remain operable and incidents are easier to diagnose

scope:
  in_scope:
    - Security remediation plan for unsafe secrets handling and secret hygiene controls
    - Database/schema remediation plan for fragmented PostgreSQL ownership, conflicting table definitions, and migration governance
    - Test/CI remediation plan for broken default pytest collection, weak gates, and reliable regression detection
    - Deployment/runtime remediation plan for immutable builds, reproducible environments, and removal of mutable bind-mounted drift
    - Documentation/runbook remediation plan for docs/runtime drift and operator-facing parity
    - Airflow environment completeness plan covering dependencies, configuration, and operability gaps
    - Prioritization of remediation work by risk, dependency order, and verification path
    - Definition of acceptance criteria for future implementation waves
  out_of_scope:
    - Feature development
    - Product behavior changes unrelated to remediation
    - Direct implementation of code, schema, infrastructure, or secret-management fixes
    - Large-scale architecture replacement beyond targeted remediation planning

acceptance_criteria:
  - criterion: Security planning explicitly defines how secrets stop being handled unsafely
    verification: PRD names required secret sources, handling boundaries, and migration expectations
  - criterion: Database planning establishes a single source of truth for schema ownership
    verification: PRD requires governed migrations and removal of conflicting table definitions
  - criterion: Test/CI planning restores dependable default validation
    verification: PRD requires passing default pytest collection and stronger CI merge gates
  - criterion: Runtime planning targets reproducible deployments
    verification: PRD requires immutable build/deploy expectations and drift detection or elimination
  - criterion: Documentation planning aligns operator docs with actual runtime
    verification: PRD requires runbook and environment documentation parity with deployed behavior
  - criterion: Airflow planning closes environment completeness gaps
    verification: PRD requires dependency, config, and operability checks for scheduler/task reliability

needs_clarification: []

features:
  - name: Security remediation plan
    overview: Define secret inventory, approved secret sources, rotation expectations, and unsafe-handling removal sequence
    status: planned
  - name: Schema governance remediation plan
    overview: Define PostgreSQL schema authority, migration path, ownership boundaries, and conflict resolution rules
    status: planned
  - name: Test and CI remediation plan
    overview: Define default pytest reliability, minimum CI gates, and regression enforcement expectations
    status: planned
  - name: Deployment and runtime remediation plan
    overview: Define immutable deployment requirements, reproducible environment controls, and runtime drift reduction
    status: planned
  - name: Documentation and runbook remediation plan
    overview: Define required updates so docs, runbooks, and runtime behavior stay aligned
    status: planned
  - name: Airflow operability remediation plan
    overview: Define environment completeness, dependency readiness, and operational validation for DAG execution
    status: planned

state_machines:
  - name: Remediation planning lifecycle
    states: [findings_confirmed, remediation_scoped, sequencing_defined, acceptance_defined, ready_for_execution]
    transitions:
      - from: findings_confirmed
        to: remediation_scoped
        trigger: Review risks translated into explicit plan themes
      - from: remediation_scoped
        to: sequencing_defined
        trigger: Dependencies and priority order agreed
      - from: sequencing_defined
        to: acceptance_defined
        trigger: Verification criteria defined for each remediation theme
      - from: acceptance_defined
        to: ready_for_execution
        trigger: PRD finalized without open clarification blockers

errors:
  - code: PLAN_001
    message: Remediation scope omits one or more critical risk themes from the completed review
  - code: PLAN_002
    message: Schema plan does not define a single source of truth for PostgreSQL structure
  - code: PLAN_003
    message: CI plan does not restore reliable default validation before merge
  - code: PLAN_004
    message: Runtime plan allows continued mutable drift without a containment strategy

decisions:
  - decision: PostgreSQL remains the primary runtime system of record for operational data and schema governance
  - decision: One canonical schema definition and governed migration path are required; conflicting table definitions are not acceptable
  - decision: Remediation is planned in themes first, then executed in dependency order rather than as ad hoc fixes
  - decision: CI must validate the default developer path, including default pytest collection, before merge
  - decision: Runtime environments should move toward immutable, reproducible deployment artifacts instead of mutable bind-mounted drift
  - decision: Operator docs and runbooks must match the live runtime and Airflow environment as deployed
  - decision: Airflow operability requirements are part of core platform remediation, not optional follow-up work

changes:
  - version: 1.0.1
    change: Marked remediation planning complete; canonical plan is ready for approval and execution sequencing
  - version: 1.0.0
    change: Replaced prior PRD contents with final remediation-planning PRD based on completed current-state review
