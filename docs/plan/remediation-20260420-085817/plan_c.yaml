    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 160
    focus_area: validation
    verification:
      - Default pytest collection failure is reproduced and traced to a concrete contract mismatch.
      - Planned CI gates mirror the supported local developer path rather than a separate special-case environment.
      - Merge requirements specify at least default pytest collection and visible failure reporting.
    acceptance_criteria:
      - Test/CI planning restores dependable default validation.
      - The plan requires passing default pytest collection and stronger CI merge gates.
      - CI scope stays targeted to remediation needs and avoids unrelated feature/test expansion.
    failure_modes:
      - scenario: CI gates are defined around a non-representative environment and still miss the default local failure mode.
        likelihood: medium
        impact: high
        mitigation: Use the default repository invocation path as the primary acceptance baseline before adding any extra jobs.
      - scenario: Overly broad initial gates create noise and block remediation progress.
        likelihood: medium
        impact: medium
        mitigation: Start with the minimum merge-blocking checks needed for confidence, then stage stricter gates after the default path is stable.
    tech_stack:
      - pytest
      - coverage.py
      - GitHub Actions
    test_coverage: Default pytest collection plus targeted smoke/import checks for optional dependency boundaries and workflow health.

  - id: rem-runtime-hardening
    title: Define immutable deployment and runtime drift containment
    objective: Replace mutable bind-mounted runtime behavior with a reproducible build/deploy model and explicit drift controls.
    description: |
      Assess the current container build, compose mounts, mutable runtime surfaces,
      and live-container dependency assumptions. Produce the hardening blueprint for
      immutable images, allowed persistent state, secret injection boundaries,
      deployment verification, rollback, and drift detection/elimination so future
      runtime changes stop depending on bind-mounted code or ad hoc in-container mutation.
    wave: 1
    agent: gem-devops
    priority: high
    status: pending
    dependencies: []
    parallelizable: true
    conflicts_with:
      - rem-secrets-boundary
      - rem-airflow-bootstrap
    target_surfaces:
      - docker-compose.yaml
      - Dockerfile
      - requirements.txt
      - requirements_dashboard.txt
      - config/
      - data/
    context_files:
      - docker-compose.yaml: Current services mount code, data, and credential files directly into runtime containers.
      - Dockerfile: Current build installs requirements into the Airflow base image and is the anchor for an immutable-image strategy.
      - requirements.txt: Runtime dependency set that must be baked into the image instead of installed into live containers.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 220
    focus_area: runtime
    verification:
      - Plan classifies every mounted surface as immutable, stateful, or removable.
      - Hardening blueprint defines deployment verification, rollback, and drift detection/removal checkpoints.
      - Runtime changes are sequenced to preserve service continuity while mutable paths are retired.
    acceptance_criteria:
      - Runtime planning targets reproducible deployments.
      - The plan requires immutable build/deploy expectations and drift detection or elimination.
      - Runtime hardening scope is limited to deployment reproducibility and does not expand into unrelated feature redesign.
    failure_modes:
      - scenario: Essential runtime state is mistaken for mutable application drift and removed without a persistence replacement.
        likelihood: medium
        impact: critical
        mitigation: Separate stateful volumes from code/config mounts and require rollback checkpoints before removing any mount.
      - scenario: Build immutability is planned without aligning secret injection, forcing operators back to live-container edits.
        likelihood: medium
        impact: high
        mitigation: Consume the secret-boundary output as a hard constraint before finalizing runtime cutover steps.
    environment: development
    requires_approval: true
    devops_security_sensitive: true

  - id: rem-airflow-bootstrap
    title: Clean up Airflow environment completeness and bootstrap flow
    objective: Align Airflow dependency installation, service bootstrap, and operability checks with the hardened runtime model.
    description: |
      Using the approved secret boundary and runtime hardening blueprint, define how
      Airflow images, bootstrap/init steps, dependency readiness, pool creation, and
