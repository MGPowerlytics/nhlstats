        mitigation: Require explicit health-gated bootstrap sequencing and environment readiness checks before any automation assumptions are approved.
      - scenario: Operators retain mutable emergency fixes because the hardened bootstrap path is incomplete.
        likelihood: medium
        impact: high
        mitigation: Document supported break-glass actions and ensure the default recovery path uses rebuilt artifacts, not live-container mutation.
    environment: development
    requires_approval: true
    devops_security_sensitive: true

  - id: rem-docs-runbooks
    title: Reconcile operator docs and runbooks with the approved remediation target state
    objective: Eliminate documentation drift by updating runbooks only after secret, schema, CI, runtime, and Airflow decisions are aligned.
