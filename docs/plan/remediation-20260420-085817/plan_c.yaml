tldr: |
  Current repo state shows live secret material and file-mounted credentials at the repo root,
  schema ownership split across helper-driven CREATE TABLE statements, a broken default pytest
  collection path, no repository CI workflows, bind-mounted runtime surfaces in docker-compose,
  and Airflow setup guidance that still assumes mutable live-container intervention. This plan
  front-loads the highest-risk decisions that can be made in parallel, then converges runtime
  and Airflow remediation, and finishes by reconciling operator documentation once the target
  operating model is stable.

open_questions:
  - Which secret backend should become the non-local source of truth for runtime and CI after file-based credentials are retired?
  - Which governed migration mechanism should own PostgreSQL change rollout for this repo: Alembic, SQL-first migrations, or an equivalent tracked migration runner?

wave_ordering_rationale:
  - Wave 1 isolates the fastest risk reducers that can be assessed safely in parallel: secrets, schema governance, validation gates, and immutable runtime direction.
  - Wave 2 applies the approved runtime and secret boundaries to Airflow bootstrap so environment cleanup does not drift from deployment hardening.
  - Wave 3 updates runbooks only after the technical target state is fixed, preventing another round of docs/runtime divergence.

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Secret handling is partially remediated while bind-mounted credentials remain active, creating dual paths and accidental credential exposure during cutover.
      likelihood: high
      impact: critical
      mitigation: Freeze new secret entry points, inventory every secret consumer first, and require a staged cutover with rollback checkpoints before runtime changes ship.
    - scenario: Schema ownership remains split between helper functions and shared schema managers, so migrations drift and future releases recreate conflicting tables.
      likelihood: high
      impact: critical
      mitigation: Name one canonical schema authority, require governed migrations for structural changes, and define explicit retirement rules for ad hoc CREATE TABLE paths.
    - scenario: CI gates are strengthened before the default local validation path is repaired, leaving maintainers blocked by failing merges without trustworthy feedback.
      likelihood: medium
      impact: high
      mitigation: Reproduce and scope the default pytest failure first, then define a staged gate set that mirrors the local default path before adding stricter merge protections.
    - scenario: Airflow cleanup is planned independently from runtime hardening, leaving operators with bootstrap steps that mutate live containers and diverge from the built image.
      likelihood: medium
      impact: high
      mitigation: Make Airflow bootstrap consume the runtime hardening blueprint and require docs updates only after both plans agree on the target environment contract.
  assumptions:
    - PostgreSQL remains the runtime system of record and schema remediation should preserve existing operational data.
    - GitHub remains the repository host and is the expected CI control plane unless a documented exception is approved.
    - Local development may keep limited convenience paths, but production-like runtime behavior should move toward immutable artifacts and non-repo secret sources.

implementation_specification:
  code_structure: Centralize future remediation work around one canonical schema/migration path, one approved secret-loading boundary per environment, one default validation command path, and one immutable build/bootstrap flow for Airflow-backed runtime services.
  affected_areas:
    - docker-compose.yaml
    - Dockerfile
    - .env.example
    - plugins/kalshi_markets.py
    - plugins/db_manager.py
    - plugins/the_odds_api.py
    - plugins/database_schema_manager.py
    - plugins/bet_tracker.py
    - scripts/backfill_team_game_stats.py
    - plugins/stats/__init__.py
    - setup.cfg
    - .github/workflows
    - docs/AIRFLOW_SETUP.md
    - docs/OPERATIONS_RUNBOOK.md
    - docs/deployment_protocol.md
  component_details:
    - component: Secret and configuration boundary
      responsibility: Define where secrets may originate, how they enter local dev, CI, and runtime, and how unsafe file-based handling is retired without service interruption.
      interfaces:
        - Approved secret inventory mapped to environment, owner, consumer, and rotation trigger
        - Secret injection contract for local development, CI, and container runtime
    - component: Schema authority and migration governance
      responsibility: Establish one source of truth for PostgreSQL structure and a governed rollout path for structural changes.
      interfaces:
        - Canonical schema ownership decision record
        - Migration workflow covering apply, verify, rollback, and deprecation of conflicting DDL helpers
    - component: Default validation and CI gates
      responsibility: Restore dependable pytest collection and define the minimum merge-blocking checks that mirror the supported developer path.
      interfaces:
        - Default local validation contract
        - CI workflow matrix and merge gate policy
    - component: Runtime deployment hardening
      responsibility: Move runtime services away from mutable bind-mounted drift toward reproducible images, controlled state volumes, and explicit rollback points.
      interfaces:
        - Immutable image/build policy
        - Mutable surface allowlist and drift detection/removal policy
    - component: Airflow environment bootstrap
      responsibility: Make Airflow dependency installation, pool/bootstrap steps, and health checks consistent with the hardened runtime contract.
      interfaces:
        - Airflow bootstrap checklist
        - Service health and operability verification contract
    - component: Operator documentation and runbooks
      responsibility: Keep deployment, Airflow, and incident response documentation aligned with the planned runtime state and verification steps.
      interfaces:
        - Runbook parity checklist
        - Documentation ownership and update cadence
  dependencies:
    - component: Airflow environment bootstrap
      relationship: Depends on secret and runtime decisions so bootstrap steps do not reintroduce mutable container behavior or unsafe credential handling.
    - component: Operator documentation and runbooks
      relationship: Depends on the outputs of secret, schema, CI, runtime, and Airflow planning so docs reflect the approved target state rather than current drift.
    - component: Default validation and CI gates
      relationship: Feeds operator and maintainer procedures because merge gating and release checks become part of the supported workflow.
  integration_points:
    - Container build and compose definitions that currently mount code, data, and secret files into Airflow services
    - Database initialization paths split between schema manager helpers and feature-specific table creation helpers
    - Default pytest collection path rooted in setup.cfg and repository test/module imports
    - Operator-facing documentation for deployment, Airflow setup, and troubleshooting

