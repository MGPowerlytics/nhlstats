    title: Define safe secret sources and staged credential migration
    objective: Replace unsafe repo/file-based secret handling with an approved, environment-specific secret boundary and no-downtime migration approach.
    description: |
      Audit current credential usage across root secret files, .env-driven configuration,
      docker-compose environment injection, and plugin-level file reads. Produce a
      remediation approach that names approved secret sources for local dev, CI, and
      runtime; defines handling boundaries; sequences credential rotation and cutover;
      and preserves operational continuity while unsafe secret paths are retired.
    wave: 1
    agent: gem-reviewer
    priority: high
    status: pending
    dependencies: []
    parallelizable: true
    conflicts_with:
      - rem-runtime-hardening
      - rem-airflow-bootstrap
    target_surfaces:
      - .env
      - .env.example
      - docker-compose.yaml
      - kalshkey
      - kalshi_private_key.pem
      - odds_api_key
      - plugins/kalshi_markets.py
      - plugins/db_manager.py
      - plugins/the_odds_api.py
    context_files:
      - docker-compose.yaml: Current Airflow services bind-mount credential files and inject SMTP env variables directly.
      - .env.example: Documents current env-based configuration surface for local setup.
      - plugins/kalshi_markets.py: Reads credential material from repo-local and container-local file paths.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 180
    focus_area: security
    verification:
      - Secret inventory covers repo files, environment variables, compose injection points, and runtime consumers.
      - Remediation approach names approved source-of-truth locations for each secret by environment.
      - Cutover plan includes rotation order, rollback trigger, and operator-safe validation steps.
    acceptance_criteria:
      - Secret planning explicitly names required secret sources, handling boundaries, and migration expectations.
      - Unsafe repo/file-based credential paths are classified as deprecated, transitional, or retained only for local-only use with guardrails.
      - The plan preserves continuity by defining a staged rollout rather than a one-step credential cutover.
    failure_modes:
      - scenario: A hidden credential consumer is missed and fails after the approved source changes.
        likelihood: medium
        impact: high
        mitigation: Require code and runtime consumer inventory plus a validation checklist before any secret source is retired.
      - scenario: Local-dev convenience exceptions expand into permanent production behavior.
        likelihood: medium
        impact: high
        mitigation: Separate local-only fallbacks from runtime-approved paths and require explicit expiry/ownership for exceptions.
    requires_review: true
    review_depth: full
    review_security_sensitive: true

  - id: rem-schema-governance
    title: Establish canonical schema ownership and migration governance
    objective: Remove conflicting PostgreSQL table definitions by choosing one schema authority and a governed migration path.
    description: |
      Inventory the current schema creation paths and overlapping DDL ownership,
      especially shared schema helpers versus feature-local CREATE TABLE logic.
      Produce the migration strategy that designates a single source of truth,
      defines how conflicting table definitions are retired, sequences rollout to
      preserve existing data, and sets verification/rollback rules for future
      structural changes.
    wave: 1
    agent: gem-researcher
    priority: high
    status: pending
    dependencies: []
    parallelizable: true
    conflicts_with: []
    target_surfaces:
      - plugins/database_schema_manager.py
      - plugins/bet_tracker.py
      - plugins/db_loader.py
      - tests/test_team_game_stats_schema.py
      - tests/test_schema_integrity.py
    context_files:
      - plugins/database_schema_manager.py: Central shared schema helper defining unified and stats tables.
      - plugins/bet_tracker.py: Feature-local helper creates placed_bets independently of the shared schema manager.
      - plugins/db_loader.py: Initializes schema through a separate loader path that must align with the canonical owner.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 260
    focus_area: database-governance
    verification:
      - Conflicting table-definition owners are mapped to a canonical authority decision.
      - Migration workflow defines apply, verify, rollback, and deprecation steps.
      - Data-preservation and compatibility constraints are documented for existing runtime tables.
    acceptance_criteria:
      - Database planning establishes a single source of truth for schema ownership.
      - Governed migrations are required for structural change and ad hoc conflicting DDL paths are scheduled for retirement.
      - The strategy defines verification checkpoints that confirm live schema and code agree before future releases.
    failure_modes:
      - scenario: The chosen canonical schema owner does not cover all currently managed tables.
        likelihood: medium
        impact: critical
        mitigation: Produce a table-by-table ownership map before ratifying the migration path.
      - scenario: Structural cleanup assumes safe recreation instead of preserving live data.
        likelihood: medium
        impact: critical
        mitigation: Require backward-compatible migration sequencing and explicit rollback checkpoints for every destructive step.

  - id: rem-pytest-ci-gates
    title: Restore dependable default pytest collection and define merge gates
    objective: Repair the default validation path and specify the minimum CI gates required to prevent regression drift.
    description: |
      Reproduce the current default pytest collection failure, identify the import/
      packaging contract it exposes, and define the least-surprising repair path
      for local developers. From that baseline, specify merge-blocking CI gates,
      workflow scope, failure visibility, and regression enforcement so the repo
