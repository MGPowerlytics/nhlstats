    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 190
    focus_area: airflow-operations
    verification:
      - Bootstrap plan names required dependencies, init order, and health checks for scheduler, worker, triggerer, and API services.
      - Operability checklist removes instructions that mutate running containers to recover missing dependencies.
      - Airflow-specific steps inherit runtime and secret constraints instead of redefining them locally.
    acceptance_criteria:
      - Airflow planning closes environment completeness gaps.
      - The plan requires dependency, config, and operability checks for scheduler/task reliability.
      - Manual bootstrap actions are reduced to controlled, documented steps that match the target runtime model.
    failure_modes:
      - scenario: Airflow pool/bootstrap automation is planned without validating service readiness dependencies, causing partial startup failures.
        likelihood: medium
