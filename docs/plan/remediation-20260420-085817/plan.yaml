    test_coverage: Schema integrity tests plus migration smoke covering fresh and already-applied states.

  - id: rem-schema-owner-cutover
    title: Move placed_bets and helper-owned production DDL under the governed migration chain
    description: |
      Consume the migration foundation to move placed_bets and the remaining
      production schema owners under the governed chain, then demote runtime
      CREATE TABLE helpers so they no longer own production schema mutation.
      This task preserves data, keeps reruns safe, and makes bootstrap/runtime
      verification rely on the ledger-backed apply plus verify path.
    wave: 3
    agent: gem-implementer
    priority: high
    status: completed
    dependencies:
      - rem-schema-migration-foundation
    parallelizable: false
    conflicts_with:
      - rem-airflow-bootstrap-flow
    repo_change_scope:
      - plugins/database_schema_manager.py and plugins/db_loader.py ownership changes so helpers stop owning production schema
      - plugins/bet_tracker.py and any schema-focused tests needed to move placed_bets ownership under migrations
      - migration files or verification helpers that encode legacy-table ownership under the governed chain
    context_files:
      - plugins/database_schema_manager.py: Current helper-owned DDL surface that must be demoted from production ownership.
      - plugins/bet_tracker.py: Contains placed_bets CREATE TABLE logic that must move under migrations.
      - plugins/db_loader.py: Currently initializes schema through helper ownership.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 180
    focus_area: schema
    verification:
      - placed_bets and the remaining live tables no longer depend on helper-owned CREATE TABLE in production paths.
      - The apply plus verify path succeeds after owner cutover and the schema_migrations ledger reflects the expected versions.
      - Bootstrap-facing checks can confirm ledger state without relying on helper side effects.
    validation_commands:
      - "python -m compileall plugins tests"
      - "bash scripts/apply_stats_schema_migrations.sh"
      - "bash scripts/verify_stats_schema_migrations.sh"
      - 'docker compose exec postgres psql -U airflow -d airflow -c "SELECT version, applied_at FROM schema_migrations ORDER BY version;"'
      - "pytest -q tests/test_schema_integrity.py tests/test_team_game_stats_schema.py"
      - 'rg "CREATE TABLE IF NOT EXISTS placed_bets|initialize_schema\\(" plugins'
    acceptance_criteria:
      - Runtime CREATE TABLE helpers are reduced to transitional or local compatibility and no longer own production schema evolution.
      - placed_bets and the remaining live production tables are governed by the checked-in migration chain plus schema_migrations ledger.
      - The supported migration path preserves existing data and exposes apply plus verify behavior that bootstrap automation can consume directly.
    failure_modes:
      - scenario: The owner cutover leaves one live table under helper ownership even though the ledger exists.
        likelihood: medium
        impact: critical
        mitigation: Use a table-by-table ownership checklist and block completion until every live owner is reassigned and verified.
      - scenario: Apply or verify succeeds on a fresh database but fails to represent preserved production data correctly.
        likelihood: medium
        impact: high
        mitigation: Exercise rerun validation plus direct schema_migrations queries against the preserved-data path before handing off to bootstrap.
    tech_stack:
      - PostgreSQL
      - SQL migration files
      - Python compatibility helpers
    test_coverage: Schema integrity tests plus migration smoke covering preserved-data reruns and helper retirement checks.

