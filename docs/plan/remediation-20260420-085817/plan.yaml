tldr: |
  Wave 1 is no longer planning work. Its outputs are now fixed contracts that
  downstream implementation must obey: runtime-only secrets, immutable runtime
  surfaces, non-repo data persistence, governed PostgreSQL migrations, and
  plain-pytest merge gates. The remaining plan converts the blocked
  implementation work into concrete repo-change tasks: refactor secret
  consumers first, then harden compose and image topology, introduce a
  versioned migration foundation with a schema_migrations ledger, cut helper-
  owned production DDL over to that ledger, restore default pytest plus merge-
  blocking GitHub Actions, encode bootstrap order in compose with one-shot init
  stages, and only then reconcile docs/runbooks.

open_questions: []

wave_ordering_rationale:
  - Wave 1 remains as completed ADR/contracts because those decisions are already fixed and must not be reopened.
  - Wave 2 applies the fixed contracts where parallelism is safe: secret consumer cutover, migration-foundation establishment, and pytest/CI enforcement.
  - Wave 3 consumes those handoffs: runtime topology hardening waits for secret-consumer cutover before removing repo-mounted secrets, and schema owner cutover waits for the migration foundation before retiring helper-owned DDL.
  - Wave 4 encodes the approved runtime into compose/bootstrap topology only after the secret, runtime, schema, and validation paths are concrete.
  - Wave 5 updates operator-facing docs only after the implementation surfaces and verification commands are stable.

fixed_contracts:
  - id: secret-boundary
    status: completed
    summary: Runtime secrets only. Canonical env includes KALSHI_API_KEY_ID, SMTP creds, Airflow UI creds, and Postgres vars. Canonical file secret is KALSHI_PRIVATE_KEY_PATH=/run/secrets/kalshi_private_key.pem.
    prohibited:
      - tracked .env
      - repo-root kalshkey
      - repo-root odds_api_key
      - repo-root PEM mounts
      - /tmp secret copies
      - manual secret creation in containers
  - id: runtime-boundary
    status: completed
    summary: Immutable code surfaces and rebuild-and-redeploy only. No steady-state whole-repo or code/config bind mounts and no runtime pip installs.
  - id: data-boundary
    status: completed
    summary: Preserved Wave 1 data-boundary ADR/handoff. Repo-root ./data mount is disallowed, and /opt/airflow/data may exist only as a managed non-repo volume/path for approved non-secret artifacts.
    prohibited:
      - API keys
      - PEM/private keys
      - .env material
      - copied credentials
      - any secret-bearing file under /opt/airflow/data
  - id: schema-governance
    status: completed
    summary: Live schema authority moves to an in-repo versioned PostgreSQL migration chain plus schema_migrations ledger. Runtime CREATE TABLE helpers are transitional and must retire from production ownership.
  - id: test-ci-contract
    status: completed
    summary: Plain pytest remains the default path. The optional-fetcher boundary must be repaired and merge-blocking collection-smoke plus default-pytest GitHub Actions jobs must be added.

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Compose and code changes remove repo-mounted secrets before every consumer is switched to the runtime-only env and /run/secrets contract.
      likelihood: medium
      impact: critical
      mitigation: Sequence secret-consumer cutover ahead of runtime-topology hardening and bootstrap topology changes, then verify all Kalshi/Odds entrypoints with explicit smoke commands before mount removal.
    - scenario: A migration chain is added but runtime CREATE TABLE helpers still mutate production schema, creating dual schema owners.
      likelihood: medium
      impact: critical
      mitigation: Make schema_migrations the only production ownership path, demote helpers to local/test compatibility only, and add verification queries for ledger state before app startup.
    - scenario: Bootstrap automation is encoded in compose before image/runtime hardening is complete, preserving hidden runtime pip installs or manual exec dependencies.
      likelihood: high
      impact: high
      mitigation: Gate bootstrap implementation on removal of _PIP_ADDITIONAL_REQUIREMENTS, removal of repo/code mounts, and green pytest/collection smoke.
    - scenario: Documentation is updated against an intermediate implementation state and reintroduces manual exec, pool creation, or secret-copy instructions.
      likelihood: medium
      impact: high
      mitigation: Keep docs in the final wave and require all concrete validation commands to be copied from completed implementation tasks only.
  assumptions:
    - docs/prd.yaml remains the source of truth for remediation scope and excludes feature work.
    - Docker Compose remains the local/runtime orchestration surface for this repo during remediation.
    - GitHub Actions is the required CI gate platform for merge-blocking validation.
    - PostgreSQL remains the runtime system of record and existing operational data must be preserved.

implementation_specification:
  code_structure: |
    Centralize remediation into four enforcement surfaces: runtime secret loading
    helpers, immutable image/compose topology, in-repo PostgreSQL migrations
    with a schema_migrations ledger, and merge-blocking CI/bootstrap
    verification. Completed ADR outputs are inputs, not deliverables.
  affected_areas:
    - docker-compose.yaml, Dockerfile, and any new bootstrap/preflight scripts required to encode startup order in-repo
    - plugins/kalshi_betting.py, plugins/kalshi_markets.py, plugins/update_clv_data.py, and DAG entrypoints that still assume repo-mounted credentials
    - plugins/database_schema_manager.py, plugins/db_loader.py, plugins/bet_tracker.py, and new migration-chain files for canonical schema ownership
    - setup.cfg, scripts/backfill_team_game_stats.py, plugins/stats/__init__.py, tests/, and new .github/workflows jobs for default pytest and collection smoke
    - docs/AIRFLOW_SETUP.md, docs/OPERATIONS_RUNBOOK.md, docs/deployment_protocol.md, and README.md for final runbook parity
  component_details:
    - component: Runtime secret consumers
      responsibility: Replace kalshkey, repo-root PEM, repo-root odds_api_key, and /tmp secret-copy patterns with the approved env and /run/secrets contract.
      interfaces:
        - KALSHI_API_KEY_ID environment variable
        - KALSHI_PRIVATE_KEY_PATH environment variable pointing to /run/secrets/kalshi_private_key.pem
        - ODDS_API_KEY environment variable for Odds API consumers
    - component: Immutable runtime topology
      responsibility: Remove mutable dependency-install and code-mount behavior from Dockerfile and docker-compose while preserving only approved persistent state surfaces.
      interfaces:
        - docker compose config as the canonical topology render
        - image-baked dependency set with no _PIP_ADDITIONAL_REQUIREMENTS support
        - managed non-repo volume/path for /opt/airflow/data when needed
    - component: Versioned schema governance
      responsibility: Introduce an in-repo PostgreSQL migration chain plus schema_migrations ledger and retire helper-owned production DDL.
      interfaces:
        - ordered migration files checked into the repo
        - schema_migrations ledger table queried by startup/bootstrap verification
        - compatibility boundary for legacy create-table helpers
    - component: Default validation and merge gates
      responsibility: Keep plain pytest as the supported local path and enforce collection-smoke plus default-pytest in GitHub Actions.
      interfaces:
        - pytest --collect-only -q
        - pytest -q
        - merge-blocking GitHub Actions workflows
    - component: Airflow bootstrap topology
      responsibility: Encode preflight, one-shot bootstrap-admin, idempotent pool/bootstrap work, and verification into compose/runtime topology rather than manual docker compose exec steps.
      interfaces:
        - preflight gate
        - bootstrap-admin one-shot service
        - idempotent bootstrap for pools and schema readiness
        - verification stage for scheduler/API visibility and pool presence
    - component: Operator documentation set
      responsibility: Publish the final supported commands only after the code, compose, migration, and CI surfaces are implemented.
      interfaces:
        - deployment runbook
        - Airflow setup/bootstrap guide
        - remediation-safe troubleshooting steps
  dependencies:
    - component: Airflow bootstrap topology
      relationship: Depends on runtime secret consumers, immutable runtime topology, schema governance, and CI gates so bootstrap automation does not reintroduce mutable behavior.
    - component: Operator documentation set
      relationship: Depends on all implementation tasks so docs reflect only supported remediation-state commands.
    - component: Default validation and merge gates
      relationship: Must be green before the bootstrap topology is treated as reviewable.
  integration_points:
    - docker-compose.yaml services, volumes, health checks, and startup ordering
    - Dockerfile dependency installation and any entrypoint/bootstrap helpers
    - Kalshi and Odds API credential loading in plugins/ and dags/
    - PostgreSQL schema initialization in plugins/database_schema_manager.py, plugins/db_loader.py, and plugins/bet_tracker.py
    - Root pytest entry path, import boundaries, and .github/workflows merge gates

