plan_id: remediation-20260420-085817
variant: a
objective: >
  Produce a risk-first remediation plan that closes unsafe secret handling,
  fragmented schema ownership, broken default pytest/CI validation, mutable
  bind-mounted runtime drift, documentation/runtime drift, and Airflow
  operability gaps while preserving operational continuity.
created_at: "2026-04-20T08:58:17Z"
created_by: gem-team:gem-planner
status: pending_approval
research_confidence: medium

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 11
  risk_score: high

tldr: |
  Wave 1 isolates the highest-risk control failures that can be investigated and designed safely in
  parallel: secret/config boundaries, schema authority, broken default validation, and Airflow bootstrap
  drift. Wave 2 uses those outputs to define one hardened deployment model and reconcile operator docs to
  the target runtime. Wave 3 is a final readiness gate so execution can begin without conflicting
  assumptions or hidden rollback gaps.
open_questions:
  - Which secret authority should become canonical for deployment: orchestrator-managed secrets, host env injection, or a dedicated secret manager?
  - What production migration constraints apply to PostgreSQL cutovers: zero-downtime only, scheduled maintenance window, or phased read/write compatibility?

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Secret source cutover is planned without dual-read and rollback boundaries, causing broken Airflow or dashboard credentials during rotation.
      likelihood: medium
      impact: critical
      mitigation: Require inventory, boundary ownership, phased migration sequencing, and rollback criteria before any secret-source change is executed.
    - scenario: Schema authority is reassigned without a governed migration path, leaving code, docs, and live tables inconsistent and breaking DAG/database writes.
      likelihood: medium
      impact: critical
      mitigation: Establish one canonical schema source, inventory all current writers/readers, and define backward-compatible migration checkpoints plus verification queries.
    - scenario: CI gates are tightened before the default pytest path is repaired, blocking merges while still missing real regressions in the default developer workflow.
      likelihood: high
      impact: high
      mitigation: Sequence collection repair and baseline validation before merge protection changes, and require the default pytest path to become the first-class gate.
    - scenario: Runtime hardening ignores current bind-mounted and manual in-container update paths, so mutable drift continues after nominal deployment cleanup.
      likelihood: high
      impact: high
      mitigation: Explicitly retire docker cp/manual pip install flows, define immutable image requirements, and add startup/bootstrap verification to the deployment contract.
  assumptions:
    - docs/prd.yaml is the source of truth for remediation scope and acceptance criteria.
    - PostgreSQL remains the operational system of record and is not being replaced.
    - Operational continuity matters more than remediation speed, so phased cutovers and rollback paths are required.
    - Airflow 3.1.6 via Docker Compose remains the current execution environment during remediation.

implementation_specification:
  code_structure: >
    Organize remediation as six bounded workstreams anchored in existing operational surfaces: runtime
    configuration (docker-compose.yaml, Dockerfile, root credential files), database governance
    (plugins/database_schema_manager.py plus schema docs/migration notes), validation and CI (setup.cfg,
    tests/, and new .github/workflows/ gates), Airflow bootstrap/runbooks (docs/AIRFLOW_SETUP.md,
    docs/OPERATIONS_RUNBOOK.md, update_running_containers.sh), and operator documentation. Each workstream
    should define target-state contracts and acceptance criteria before implementation changes begin.
  affected_areas:
    - docker-compose.yaml
    - Dockerfile
    - .gitignore
    - setup.cfg
    - tests/
    - .github/workflows/
    - plugins/database_schema_manager.py
    - plugins/db_manager.py
    - plugins/stats/__init__.py
    - update_running_containers.sh
    - docs/OPERATIONS_RUNBOOK.md
    - docs/AIRFLOW_SETUP.md
    - docs/AIRFLOW_POOL_SETUP.md
    - docs/DASHBOARD_STARTUP_GUIDE.md
    - docs/TROUBLESHOOTING.md
    - docs/database_schema.md
    - docs/bet_tracker_schema_migration.md
  component_details:
    - component: Secret and configuration boundaries
      responsibility: Define the canonical sources, handling boundaries, git hygiene rules, rotation sequence, and rollback expectations for all runtime credentials and secret-like files.
      interfaces:
        - Secret inventory matrix covering source, consumer, mount/env path, owner, and rotation requirement.
        - Approved secret-loading contract for Airflow, dashboard, and local developer workflows.
    - component: Schema governance and migrations
      responsibility: Define one source of truth for PostgreSQL structure, ownership boundaries for schema changes, and the governed migration path that replaces ad hoc CREATE TABLE or manual ALTER behavior.
      interfaces:
        - Schema authority map linking canonical definitions, migration scripts, and verification queries.
        - Backward-compatible migration sequencing for live tables and DAG writers.
    - component: Default validation and CI gates
      responsibility: Restore reliable default pytest collection/execution and specify minimum CI/merge gates that enforce the default developer path.
      interfaces:
        - Default validation contract for pytest collection, unit tests, and required CI jobs.
        - Merge-gate policy describing fail-fast behavior and exceptions for optional integrations.
    - component: Airflow bootstrap and environment completeness
      responsibility: Remove manual bootstrap drift, define image dependency completeness, and codify required one-time setup versus automated startup behavior.
      interfaces:
        - Bootstrap checklist for pools, providers, optional dependencies, and health checks.
        - Immutable image/bootstrap bill of materials for scheduler, worker, and API server.
    - component: Deployment hardening
      responsibility: Consolidate runtime, secret, schema, and validation outputs into one reproducible deployment model with cutover, verification, and rollback requirements.
      interfaces:
        - Hardened deployment protocol with immutable artifact rules, migration sequencing, and drift controls.
        - Post-deploy validation checklist tied to required CI gates and Airflow health signals.
    - component: Operator documentation and runbooks
      responsibility: Reconcile docs with the target runtime so operators follow current secret, schema, Airflow, and deployment procedures.
      interfaces:
        - Canonical runbook set for startup, troubleshooting, schema changes, and deployment.
        - Documentation delta list identifying obsolete localhost/default-credential and legacy DuckDB guidance.
  dependencies:
    - component: Secret and configuration boundaries
      relationship: Provides the credential-handling contract consumed by deployment hardening and documentation reconciliation.
    - component: Schema governance and migrations
      relationship: Provides migration sequencing and source-of-truth rules consumed by deployment hardening and operator docs.
    - component: Default validation and CI gates
      relationship: Provides the quality gate contract that deployment hardening must enforce before merge and release.
    - component: Airflow bootstrap and environment completeness
      relationship: Provides the runtime/bootstrap requirements that deployment hardening and docs must adopt.
    - component: Deployment hardening
      relationship: Combines upstream workstream outputs into one execution model and supplies the target runtime for docs/runbooks.
    - component: Operator documentation and runbooks
      relationship: Publishes the final operator-facing procedures and serves as an input to final readiness review.
  integration_points:
    - Runtime secret injection and volume/env handling in docker-compose.yaml
    - Image dependency installation and immutable build policy in Dockerfile
    - Default pytest behavior in setup.cfg and tests/
    - Future CI workflows and branch gates in .github/workflows/
    - Schema authority and migration governance across plugins/database_schema_manager.py and schema docs
    - Airflow bootstrap/runbook surfaces in docs/AIRFLOW_SETUP.md, docs/OPERATIONS_RUNBOOK.md, and update_running_containers.sh

