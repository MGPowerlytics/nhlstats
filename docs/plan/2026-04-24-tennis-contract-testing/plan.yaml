plan_id: 2026-04-24-tennis-contract-testing
variant: a
objective: >
  Full contract testing for the Tennis pipeline covering CSV ingestion
  (Sackmann + tennis-data), tennis_games + unified_games persistence,
  tennis_player_match_stats upserts, the Tennis Elo emitter (with Platt
  calibration), Kalshi market normalization + paired-event aggregation,
  bet opportunity emission, and recommendation persistence.
