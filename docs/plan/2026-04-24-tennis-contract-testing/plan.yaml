tldr: |
  The Tennis contract initiative mirrors the EPL/MLB contract layout. The
  shared tests/contracts/ scaffold from prior waves is reused; Tennis adds
  9 versioned JSON Schemas, 10 deterministic fixture modules, and 14
  consumer/provider tests covering every Tennis boundary in scope. All
  green-fix work is Tennis-only and tightly scoped: a structured
  predict_with_payload + Platt calibration in TennisEloRating, TENNIS
  branches in plugins/odds_comparator.py (sport tag, recommendation_date
  parsing, edge clamp, tour surfacing), and TENNIS branches in
  plugins/bet_loader.py (sport normalisation, stable bet id, synthetic
  ticker fallback). The default pytest path is the validation surface; no
  new tooling was introduced.

open_questions: []

wave_ordering_rationale:
  - Wave 1 reused the existing EPL/MLB contract scaffold under tests/contracts/.
  - Wave 2 froze Tennis consumer schemas and consumer red tests in parallel.
  - Wave 3 added Tennis provider red tests against the frozen schemas.
  - Waves 4-6 turned red contracts green via Tennis-only compatibility fixes in TennisEloRating (Platt calibration), odds_comparator, and bet_loader.
  - Wave 7 confirmed default pytest collection picks up the new Tennis tests through existing testpaths.
  - Wave 8 ran a full non-Tennis regression sweep to prove no other sport regressed.
  - Wave 9 updated CHANGELOG.md, AGENTS.md, and recorded this completion plan.

wave_layout:
  - wave: 1
    name: scaffold-reuse
    summary: Reuse the EPL/MLB contract scaffold (conftest, helpers, schema loaders) under tests/contracts/.
  - wave: 2
    name: schemas-and-consumers-red
    summary: Land 9 tennis_*_v1.json schemas plus 7 consumer red tests covering every Tennis boundary.
  - wave: 3
    name: providers-red
    summary: Land 7 provider red tests that exercise real Tennis producers against the frozen contracts.
  - wave: 4
    name: elo-payload-and-platt
    summary: Add TennisEloRating.predict_with_payload + per-tour Platt calibration loaded from data/calibration/tennis_platt_by_tour.json.
  - wave: 5
    name: odds-comparator-tennis-branches
    summary: TENNIS sport uppercasing, game_id-derived recommendation_date, max_edge clamp extension, and tour surfacing in plugins/odds_comparator.py.
  - wave: 6
    name: bet-loader-tennis-branches
    summary: TENNIS sport normalisation, stable bet id generator, and deterministic synthetic ticker fallback in plugins/bet_loader.py.
  - wave: 7
    name: contract-validation-wiring
    summary: Confirmed pytest auto-collects the new Tennis contract tests under existing testpaths.
  - wave: 8
    name: non-tennis-regression-sweep
    summary: Full non-Tennis regression gauntlet (EPL+MLB contracts, Kalshi smoke, unified_games coverage, odds_comparator/bet_loader/portfolio_types, high-edge disagreement) — all green.
  - wave: 9
    name: docs-and-final-review-gate
    summary: CHANGELOG.md, AGENTS.md, and this completion record; final review gate confirms 435 contract tests pass with zero unexpected xpasses or failures.

