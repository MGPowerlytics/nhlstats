    acceptance:
      - Reviewer sign-off confirms every PRD-approved EPL boundary has schema assets plus consumer/provider coverage.
      - Review confirms production fixes stay limited to canonical identity, season, Elo, Kalshi draw/TIE, and recommendation persistence invariants required for contracts to pass.
      - No unresolved EPL contract gap or out-of-scope downstream consumer expansion remains at review time.
