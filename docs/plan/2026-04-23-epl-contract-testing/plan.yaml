tldr: |
  The revised canonical plan keeps the work EPL-bounded while removing unsafe
  Wave 1 parallelism. A single contract-suite scaffold now lands first, all
  schema-and-consumer red tasks depend on that scaffold, and provider red work
  stays parallel except where explicit conflicts serialize the helper-sharing
  recommendation, Kalshi, and historical-stats tasks before any green
  production fix work begins. Multi-boundary tasks were split into smaller
  atomic deliverables, every task now has explicit verification plus validation
  commands, and the only shared-surface DAG touch is isolated into a minimal
  EPL-only compatibility task with anti-scope-creep acceptance criteria.

open_questions: []

wave_ordering_rationale:
  - Wave 1 creates the single EPL-only contract scaffold that every later contract task consumes.
  - Wave 2 defines canonical schemas and consumer red tests in parallel, but only after the scaffold exists.
  - Wave 3 adds provider red tests only after the matching schema and fixture contracts are already frozen, with explicit conflicts serializing the helper-sharing provider tasks.
  - Waves 4-6 turn red contracts green through small EPL-scoped fixes, with the shared DAG touch isolated behind contract-proofing tasks.
  - Waves 7-9 wire validation, update durable docs, and hold a final review gate after all EPL contract boundaries are enforced.

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Provider red tests are authored before canonical schemas and shared fixtures stabilize, causing noisy failures and contract churn instead of real drift detection.
      likelihood: high
      impact: high
      mitigation: Force every provider red task to depend on the suite scaffold plus its matching schema-and-consumer task, and keep schema assets versioned under tests/contracts/schemas/.
    - scenario: A shared-surface change in dags/multi_sport_betting_workflow.py expands beyond EPL contract storage compatibility and accidentally alters other sports or downstream consumers.
      likelihood: medium
      impact: critical
      mitigation: Isolate the DAG edit into its own EPL-only compatibility task with explicit repo-change scope, targeted DAG smoke validation, and acceptance criteria forbidding non-EPL or portfolio/dashboard expansion.
    - scenario: Identity and season fixes are implemented as broad refactors across shared loaders instead of the smallest EPL contract-alignment changes.
      likelihood: medium
      impact: high
      mitigation: Split ingestion and stats fixes into separate atomic tasks and require acceptance criteria that keep the scope limited to EPL-owned boundaries and shared-storage compatibility.
    - scenario: Contract validation wiring diverges from normal pytest execution, leaving EPL contract checks as an optional side path that developers and CI can skip.
      likelihood: medium
      impact: high
      mitigation: Reserve a dedicated validation-wiring task that must prove collection and execution through normal pytest and the existing pytest GitHub Actions flow.
  assumptions:
    - docs/prd.yaml remains the source of truth for EPL contract scope and keeps portfolio/dashboard consumers out of scope unless minimal shared compatibility is strictly required.
    - tests/contracts/ does not yet exist and this plan must add the repository's first dedicated contract suite there.
    - PostgreSQL row compatibility remains governed from one canonical contract location, consistent with the root AGENTS.md guidance.
    - The default developer and CI verification path remains pytest rather than a separate contract runner.

implementation_specification:
  code_structure: |
    Organize the EPL contract effort into four layers: a single shared
    tests/contracts foundation; versioned JSON Schema plus consumer red tests for
    each approved EPL boundary; provider red tests that validate real producers
    against those frozen contracts; and small EPL-only green fixes plus pytest
    wiring. Shared-surface code changes are permitted only where strictly needed
    to preserve EPL contract storage compatibility.
  affected_areas:
    - tests/contracts/, including shared fixtures/helpers, versioned schemas, and provider/consumer contract tests
    - plugins/csv_history_loader.py, plugins/csv_processors.py, plugins/elo/epl_elo_rating.py, plugins/odds_comparator.py, plugins/kalshi_markets.py, plugins/bet_loader.py, and plugins/stats/soccer_box_score.py
    - dags/multi_sport_betting_workflow.py only for a minimal EPL-only compatibility touch required to enforce contract-safe storage behavior
    - requirements.txt, setup.cfg, and .github/workflows/pytest.yml for normal pytest execution of the EPL contract suite
    - CHANGELOG.md and AGENTS.md for durable release-note and contributor guidance updates
  component_details:
    - component: EPL contract suite scaffold
      responsibility: Provide the shared test package, schema loaders, reusable validators, and deterministic EPL fixtures consumed by all contract tasks.
      interfaces:
        - tests/contracts/conftest.py shared pytest fixtures
        - tests/contracts/helpers.py schema and invariant helpers
        - tests/contracts/schemas/*.json versioned canonical contract assets
    - component: EPL contract schemas and consumer tests
      responsibility: Freeze the consumer-facing expectations for each approved EPL boundary before provider tests or production fixes expand.
      interfaces:
        - CSV ingestion and persisted row schemas
        - Elo prediction, opportunity, and recommendation persistence schemas
        - Kalshi market normalization and soccer stats payload schemas
    - component: EPL provider contract coverage
      responsibility: Prove actual EPL producers emit payloads and DB params that satisfy the canonical schemas and invariants.
      interfaces:
        - FootballDataCoUkGames, CSVHistoryLoader, EPLCSVProcessor
        - EPLEloRating, process_games_with_elo, OddsComparator, identify_good_bets, BetLoader
        - fetch_epl_markets, save_to_db, SoccerBoxScoreFetcher
    - component: EPL-only compatibility fixes
      responsibility: Make the smallest production changes needed to satisfy the contract suite while preserving governed storage compatibility and limiting shared-surface impact.
      interfaces:
        - EPL game_id and season mappings across ingestion and stats
        - draw/TIE and recommendation persistence semantics
        - minimal EPL-only compatibility touch in multi_sport_betting_workflow.py
  dependencies:
    - component: Provider contract coverage
      relationship: Depends on the scaffold plus the matching schema-and-consumer task so provider failures reflect true contract drift instead of undefined contracts.
    - component: EPL-only compatibility fixes
      relationship: Depend on the red-test tasks that expose the exact invariant breakage to fix.
    - component: Validation wiring
      relationship: Depends on all contract and green-fix tasks so pytest integration reflects the final EPL contract surface.
    - component: Documentation and final review
      relationship: Depend on validated contract execution so docs and review describe the shipped behavior rather than intermediate intent.
  integration_points:
    - pytest collection and execution under tests/contracts/
    - CSV ingestion into epl_games and unified_games
    - Elo and opportunity outputs consumed by OddsComparator and recommendation persistence
    - Kalshi market normalization into unified_games and game_odds
    - SoccerBoxScoreFetcher writes into team_game_stats and soccer_team_game_stats_ext
    - multi_sport_betting_workflow only where EPL contract storage compatibility requires a minimal shared-surface adjustment

