  - id: contract-suite-scaffold
    title: Scaffold the first EPL-only contract suite
    description: |
      Add the repository's first dedicated tests/contracts scaffold as a single
      EPL-only foundation. Create shared schema loaders, reusable JSON Schema
      validators, deterministic EPL sample payload builders, and common pytest
      fixtures so every later schema, consumer, and provider contract task works
      from one canonical contract harness and does not widen into non-EPL suites.
    wave: 1
    agent: gem-implementer
    priority: high
    status: pending
    dependencies: []
    parallelizable: false
    conflicts_with: []
    repo_change_scope:
      - tests/contracts/__init__.py, tests/contracts/conftest.py, and tests/contracts/helpers.py
      - tests/contracts/fixtures/ EPL-only fixture package
      - tests/contracts/schemas/ versioned schema directory layout only
    context_files:
      - docs/prd.yaml: Source-of-truth EPL contract scope and acceptance criteria.
      - AGENTS.md: Canonical schema governance preference for shared storage surfaces.
      - setup.cfg: Existing pytest collection surface that the scaffold must remain compatible with.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 180
    focus_area: contract-foundation
    verification:
      - tests/contracts/ imports cleanly under pytest collection without adding non-EPL suites.
      - Shared helpers can load versioned schema assets and build deterministic EPL fixtures consumed by later tasks.
      - The scaffold establishes one canonical schema location for governed row and payload contracts.
    validation_commands:
      - "pytest --collect-only -q tests/contracts"
      - "python -m compileall tests/contracts"
    acceptance_criteria:
      - tests/contracts/ exists as a net-new EPL-focused contract suite with shared fixtures and helpers.
      - Versioned schema assets can be loaded from tests/contracts/schemas/ through shared utilities.
      - The scaffold does not introduce portfolio, dashboard, or non-EPL contract coverage.
    failure_modes:
      - scenario: The foundation quietly bakes in shared-consumer assumptions that later force scope creep beyond EPL-owned boundaries.
        likelihood: medium
        impact: high
        mitigation: Keep fixtures and helper names EPL-specific and validate collection only under tests/contracts/.
    tech_stack:
      - Python
      - pytest
      - JSON Schema
    test_coverage: Scaffold collection smoke plus helper import coverage.

