    description: |
      Create a focused unit test module that validates the schema manager declares:
        - team_game_stats with PK (game_id, team) and FK to unified_games
        - all 6 extension tables with PK (game_id, team) and FK to team_game_stats
        - tennis_player_match_stats and bet_reconciliation_audit

      The test should use the project’s schema creation pathway (database_schema_manager + DBManager)
      to create tables in a test database and then assert constraints/indexes exist.
    acceptance:
      - pytest -q tests/test_team_game_stats_schema.py passes once schema is implemented.
      - Tests fail meaningfully if PK/FK constraints are missing.

