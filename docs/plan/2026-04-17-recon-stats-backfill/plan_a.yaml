plan_id: 2026-04-17-recon-stats-backfill
variant: a
objective: >
  Add (1) a daily Kalshi placed_bets reconciliation task with auto-correction + immutable audit logging,
  and (2) a full historical + daily incremental ingestion pipeline for team-level box score and derived
  advanced stats across 9 sports (plus tennis player-match stats), backed by new Postgres tables,
  a one-shot resumable backfill script (2021-present), and comprehensive tests/docs/validation.

plan_metrics:
  total_tasks: 40
  wave_1_task_count: 18
  total_dependencies: 71
  risk_score: 6

tasks:
  # -------------------------
  # Wave 1 (max parallelism): schema/test scaffolds + module/DAG skeletons
