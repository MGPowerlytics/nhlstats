  - id: schema-column-spec
    title: Define stats + audit column contracts
    wave: 1
    agent: gem-implementer
    dependencies: []
    conflicts_with: []
    files:
      - plugins/database_schema_manager.py
      - docs/database_schema.md
    description: |
      Define the canonical column set and constraints for:
        - team_game_stats (core, all sports; PK (game_id, team); FK to unified_games.game_id)
        - Extension tables: nba_team_game_stats_ext, nhl_team_game_stats_ext, mlb_team_game_stats_ext,
          nfl_team_game_stats_ext, soccer_team_game_stats_ext (EPL+Ligue1), cbb_team_game_stats_ext (NCAAB+WNCAAB)
        - tennis_player_match_stats (player-level, PK (match_id, player))
        - bet_reconciliation_audit (immutable append-only audit rows for any placed_bets corrections)

      Include:
        - required vs optional columns
        - normalized units (e.g., possessions, minutes, seconds)
        - index plan (query patterns: by sport/date/season; joins on game_id)
        - reconciliation field coverage for placed_bets (status, fill price, fees, payout, settlement ts, etc.)

      Output is implemented as code comments + doc updates to guide subsequent tasks.
    acceptance:
      - docs/database_schema.md contains a clear table-by-table column contract and index plan.
      - plugins/database_schema_manager.py has TODO markers and placeholder table definitions matching the contract.

