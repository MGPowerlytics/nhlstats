plan_id: 2026-04-24-mlb-contract-testing
variant: a
objective: >
  Full contract testing for the MLB pipeline covering the MLB betting
  pipeline (schedule ingestion, Elo + pitcher Elo, ensemble, Glicko-2,
  Kalshi market normalization, opportunity emission, recommendation
  persistence) plus the MLB historical stats pipeline (team game stats
  and MLB-specific extension rows).
