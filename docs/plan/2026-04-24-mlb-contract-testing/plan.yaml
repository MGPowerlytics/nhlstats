fixes_shipped:
  - area: kalshi-outcome-naming
    location: _determine_outcome_name
    description: MLB franchise-code resolution so Kalshi outcome names map correctly for MLB markets.
  - area: opportunity-normalization
    location: plugins/odds_comparator.py
    description: MLB sport-tag uppercasing and max_edge clamp aligned with other sports' normalization path.
  - area: recommendation-persistence
    location: plugins/bet_loader.py
    description: Stable MLB bet ids and a deterministic synthetic ticker emitted when no real Kalshi ticker is available.
  - area: producer-payload-emitters
    location: plugins/elo/mlb_elo_rating.py (MLBEloRating), plugins/elo/mlb_pitcher_elo.py (PitcherEloLadder), plugins/mlb_prediction_context.py (MLBPredictionContext), plugins/mlb_ensemble_model.py (MLBEnsembleModel), plugins/elo/mlb_glicko2_rating.py (MLBGlicko2Rating)
    description: Structured contract-shaped payload emitters so producers emit objects that satisfy mlb_elo_prediction_v1, mlb_pitcher_elo_v1, mlb_ensemble_io_v1, and mlb_glicko2_v1 directly.

