tldr: |
  The MLB contract initiative mirrors the EPL contract layout. A single
  shared `tests/contracts/` scaffold from the EPL wave is reused; MLB adds
  13 versioned JSON Schemas, 11 deterministic fixture modules, and 22
  consumer/provider tests covering every MLB boundary in scope. All
  green-fix work is MLB-only and tightly scoped: franchise-code resolution
  in `_determine_outcome_name`, MLB sport uppercasing + max_edge clamp in
  `plugins/odds_comparator.py`, stable MLB bet ids and synthetic ticker in
  `plugins/bet_loader.py`, and structured payload emitters across
  `MLBEloRating`, `PitcherEloLadder`, `MLBPredictionContext`,
  `MLBEnsembleModel`, and `MLBGlicko2Rating`. The default pytest path is
  the validation surface; no new tooling was introduced.

open_questions: []

wave_ordering_rationale:
  - Wave 1 reused the existing EPL contract scaffold under tests/contracts/ rather than introducing parallel infrastructure.
  - Wave 2 froze MLB consumer schemas and consumer red tests in parallel.
  - Wave 3 added MLB provider red tests against the frozen schemas.
  - Waves 4-6 turned red contracts green via MLB-only compatibility fixes in odds_comparator, bet_loader, and the MLB rating/ensemble producers.
  - Wave 7 confirmed default pytest collection picks up the new MLB tests through existing testpaths.
  - Wave 8 ran a full non-MLB regression sweep to prove no other sport regressed.
  - Wave 9 updated CHANGELOG.md, AGENTS.md, and recorded this completion plan before the final review gate.

wave_layout:
  - wave: 1
    name: scaffold-reuse
    summary: Reuse the EPL contract scaffold (conftest, helpers, schema loaders) under tests/contracts/.
  - wave: 2
    name: schemas-and-consumers-red
    summary: Land 13 mlb_*_v1.json schemas plus 11 consumer red tests covering every MLB boundary.
  - wave: 3
    name: providers-red
    summary: Land 11 provider red tests that exercise real MLB producers against the frozen contracts.
  - wave: 4
    name: identity-and-normalization-fixes
    summary: MLB franchise-code resolution in _determine_outcome_name; MLB sport uppercasing and max_edge clamp in odds_comparator.
  - wave: 5
    name: bet-loader-fixes
    summary: Stable MLB bet ids and deterministic synthetic ticker emission in bet_loader.
  - wave: 6
    name: producer-payload-emitters
    summary: Structured contract-shaped payload emitters added to MLBEloRating, PitcherEloLadder, MLBPredictionContext, MLBEnsembleModel, and MLBGlicko2Rating.
  - wave: 7
    name: contract-validation-wiring
    summary: Confirmed pytest auto-collects the new MLB contract tests under existing testpaths and the existing pytest GitHub Actions workflow runs them with no config changes required.
  - wave: 8
    name: non-mlb-regression-sweep
    summary: Full non-MLB regression gauntlet (EPL contracts, Kalshi smoke, unified games coverage, glicko/odds_comparator/bet_loader/portfolio_types, high-edge disagreement) — all green.
  - wave: 9
    name: docs-and-final-review-gate
    summary: CHANGELOG.md and AGENTS.md updates plus this completion record; final review gate confirms 344 contract tests pass with zero unexpected xpasses or failures.

