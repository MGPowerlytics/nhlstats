  - id: "task-2-2-fix-bet-tracker"
    title: "Fix _calculate_closing_probability to use real closing prices"
    description: |
      Modify the _calculate_closing_probability function in plugins/bet_tracker.py
      (currently at line 484) to attempt real closing price lookup before falling
      back to binary outcome.

      Current behavior (broken):
        Returns 1.0/0.0 based on market_result ("yes"/"no") — this is the game
        outcome, NOT the closing line.

      New behavior:
        1. Import compute_real_closing_price from plugins.clv_tracker.
        2. Accept additional parameters: ticker, market_close_time_utc, sport,
           home_team, away_team.
        3. First, call compute_real_closing_price to get real closing price.
        4. If real closing price found, return it.
        5. If not found, fall back to binary outcome (existing logic).
        6. Log which method was used: "CLV source: game_odds" vs "CLV source: binary_fallback".

      Update the function signature and all callers. The function is called from
      _calculate_probabilities_and_clv (around line 186-212) — update that call
      site to pass the additional parameters from BetData.

