  - id: "task-2-1-fix-clv-computation"
    title: "Fix CLV computation with real closing prices from game_odds"
    description: |
      Add three new functions to plugins/clv_tracker.py that replace the broken
      binary CLV with real market closing prices from the game_odds table.

      1. compute_real_closing_price(ticker, market_close_time_utc, sport, home_team, away_team):
         - Match bet to game: Query unified_games WHERE sport=sport AND
           home_team_name=home_team AND away_team_name=away_team AND
           game_date = DATE(market_close_time_utc). Use LIKE for fuzzy matching
           if exact match fails.
         - Once game_id found, query game_odds for last snapshot before
           market_close_time_utc: SELECT price FROM game_odds WHERE
           game_id=game_id AND last_update <= market_close_time_utc
           ORDER BY last_update DESC LIMIT 1.
         - Convert odds price to implied probability.
         - Flag 'stale_close' if snapshot is >4hr before market_close_time_utc.
         - Return dict with keys: closing_prob (float|None), stale (bool),
           source ('game_odds'|'none'), game_id (str|None).

      2. backfill_real_clv():
         - Query: SELECT * FROM placed_bets WHERE status IN ('won','lost')
           AND (closing_line_prob IN (0.0, 1.0) OR closing_line_prob IS NULL).
         - For each bet: call compute_real_closing_price.
         - If real closing price found: UPDATE closing_line_prob, recalculate
           clv = bet_line_prob - closing_line_prob, UPDATE clv.
         - Return dict: {updated: int, null_count: int, stale_count: int}.

      3. update_real_closing_lines():
         - Query recently settled bets (last 7 days) with binary CLV.
         - Same logic as backfill but scoped to recent bets.
         - Return count of updated bets.
         - Designed for hourly DAG — must be fast and fault-tolerant.

      Use default_db from plugins.db_manager for all queries. Log progress with
      print statements. Handle edge cases: None timestamps, missing game_odds,
      missing unified_games match.
    wave: 2
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
