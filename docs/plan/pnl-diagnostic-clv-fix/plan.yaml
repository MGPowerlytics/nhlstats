  # ============================================================
  # WAVE 3: Core Diagnostic Module (depends on Wave 2)
  # ============================================================

  - id: "task-3-1-pnl-diagnostic-core"
    title: "Build P&L diagnostic module with Elo replay, timing, and bootstrap"
    description: |
      Create plugins/pnl_diagnostic.py with the full diagnostic pipeline. This is
      the main deliverable — a comprehensive P&L analysis tool per sport.

      Main orchestrator:
        run_diagnostic() -> Dict:
          For each sport with >=50 settled bets:
            1. backfill_real_clv() — fix historical binary CLV
            2. replay_elo_ratings(sport) — replay all games chronologically
            3. compare_replay_vs_csv(sport, replayed) — max Elo divergence
            4. recalculate_bet_metrics(sport, replayed) — recalc elo_prob/edge
            5. compute_timing_analysis(bets_df) — ROI by timing bucket
            6. what_if_timing_replay(bets_df, 2.0) — what if only <2hr bets
            7. bootstrap_pnl_test(profits) — significance test
            8. generate_recommendation(sport, roi, clv, bootstrap) — CONTINUE/PAUSE
            9. write_results_to_db(results) — persist to diagnostic_results

      Sub-functions:
        replay_elo_ratings(sport) -> Dict[str, float]:
          - Query unified_games for sport, ORDER BY game_date, commence_time.
          - Instantiate Elo via create_elo_instance(sport).
          - Process games chronologically, updating ratings.
          - Print progress every 1000 games.
          - Return final {team_name: rating} dict.

        compare_replay_vs_csv(sport, replayed_ratings) -> float:
          - Load current stored ratings (from Elo instance or CSV).
          - Compare per-team. Return max absolute divergence.

        recalculate_bet_metrics(sport, replayed_ratings) -> pd.DataFrame:
          - Query placed_bets for sport.
          - For each bet: look up replayed Elo rating for home/away at bet time.
          - Recalculate elo_prob and edge using replayed ratings.
          - Return DataFrame with original and recalculated columns.

        compute_timing_analysis(bets_df) -> Dict:
          - Calculate hours_before_game = (market_close_time_utc - placed_time_utc).
          - Bucket: <1hr, 1-2hr, 2-4hr, 4-8hr, 8+hr.
          - Per bucket: count, ROI, avg_edge, win_rate.
          - Exclude rows with null timestamps.

        what_if_timing_replay(bets_df, max_hours=2.0) -> Dict:
          - Filter to bets placed within max_hours of game.
          - Compute ROI on filtered subset.
          - Compare to overall ROI.

        bootstrap_pnl_test(profits, n_bootstrap=10000) -> Dict:
          - Resample profits with replacement n_bootstrap times.
          - Compute mean for each resample.
          - p-value = fraction of resampled means <= 0.
          - Return: {mean_profit, p_value, ci_lower, ci_upper, n_samples}.

        generate_recommendation(sport, roi, real_clv, bootstrap_result) -> str:
          - If bootstrap n_samples < 50: return "INSUFFICIENT_DATA"
          - If bootstrap ci_upper < 0: return "PAUSE"
          - If real_clv > 0 AND bootstrap p_value < 0.1: return "CONTINUE"
          - Else: return "CONTINUE" (benefit of the doubt)

        write_results_to_db(results) -> bool:
          - Insert into diagnostic_results table.
          - Return True on success, False on failure.
          - Wrap in try/except, log errors.

        print_diagnostic_report(results):
          - Pretty-print with emoji indicators.
          - Green for positive ROI/CLV, red for negative.
          - Show recommendation prominently.

      Import create_elo_instance from plugins.elo.factory.
      Import default_db from plugins.db_manager.
      Import backfill_real_clv from plugins.clv_tracker.
      Import BUG_ERA_CUTOFF_DATE from plugins.constants.
    wave: 3
    agent: gem-implementer
    priority: high
    status: pending
    dependencies:
