plan_id: pnl-diagnostic-clv-fix
objective: |
  Build a P&L diagnostic module with fixed CLV computation, timing analysis,
  bootstrap significance testing, and auto-pause recommendations.
created_at: "2025-07-24T00:00:00Z"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 12
  risk_score: medium

tldr: |
  Fix the critical CLV bug (binary outcomes instead of real closing prices),
  then build a full P&L diagnostic module with Elo replay, timing analysis,
  bootstrap significance testing, and auto-pause recommendations. Integrate
  ongoing CLV tracking into the hourly bet sync DAG. 10 tasks across 4 waves —
  foundation (schema + tests), CLV fix, core diagnostics, and DAG integration.

open_questions:
  - "game_odds snapshots may be sparse for older bets — what is the actual coverage rate for historical closing prices?"
  - "Should the auto-pause recommendation trigger any automated action (e.g., DAG pause), or is it advisory-only for now?"
  - "Are there ticker formats beyond Kalshi KXNBAGAME-26JAN27-LAL that need parsing (e.g., NHL, MLB, NFL tickers)?"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "game_odds has insufficient closing price snapshots for most historical bets"
      likelihood: medium
      impact: high
      mitigation: |
        backfill_real_clv returns counts of NULL (no snapshot) and stale snapshots.
        Track coverage rate and degrade gracefully — leave binary CLV in place when
        no game_odds snapshot exists, flag as 'no_closing_price'.
    - scenario: "Ticker-to-game_id matching fails due to team name mismatches between placed_bets and unified_games"
      likelihood: medium
      impact: high
      mitigation: |
        Use home_team + away_team + game_date from placed_bets to match against
        unified_games rather than parsing ticker directly. Add fuzzy matching
        fallback and log unmatched bets for manual review.
    - scenario: "Elo replay diverges significantly from CSV ratings due to missing games or ordering"
      likelihood: low
      impact: medium
      mitigation: |
        Log divergence per-team. Accept <50 Elo point divergence as normal.
        Flag >50 point divergence in diagnostic report for investigation.
    - scenario: "Bootstrap test with small sample sizes produces unreliable p-values"
      likelihood: medium
      impact: medium
      mitigation: |
        Require minimum 50 settled bets per sport. Return INSUFFICIENT_DATA
        recommendation for sports below threshold. Document confidence intervals
        alongside p-values.
  assumptions:
    - "placed_bets.home_team and away_team columns contain team names matchable to unified_games.home_team_name and away_team_name"
    - "game_odds table has at least some pre-market-close snapshots for recent bets (last 30-60 days)"
    - "BaseEloRating subclasses can be instantiated and replayed without side effects on production ratings"
    - "SQLite test DB in conftest.py correctly simulates PostgreSQL behavior for all queries used in this feature"
    - "placed_bets.market_close_time_utc is populated for settled bets"

implementation_specification:
  code_structure: |
    New module plugins/pnl_diagnostic.py contains all diagnostic logic as standalone
    functions (no class needed). CLV fix extends existing plugins/clv_tracker.py with
    new functions. bet_tracker.py gets a surgical fix to _calculate_closing_probability.
    Schema addition via plugins/database_schema_manager.py. DAG integration as a new
    PythonOperator task in dags/bet_sync_hourly.py.
  affected_areas:
    - "plugins/constants.py — new BUG_ERA_CUTOFF_DATE constant"
    - "plugins/database_schema_manager.py — diagnostic_results table DDL"
    - "plugins/clv_tracker.py — compute_real_closing_price, backfill_real_clv, update_real_closing_lines"
    - "plugins/bet_tracker.py — _calculate_closing_probability fix"
    - "plugins/pnl_diagnostic.py — new diagnostic module"
    - "dags/bet_sync_hourly.py — update_closing_lines task"
    - "tests/test_pnl_diagnostic.py — diagnostic module tests"
    - "tests/test_clv_tracker_fix.py — CLV fix tests"
    - "CHANGELOG.md — release notes"
  component_details:
    - component: "CLV Fix (clv_tracker.py)"
      responsibility: |
        Replace binary closing line values with real market closing prices from
        game_odds table. Match bets to games via home_team/away_team lookup in
        unified_games. Provide backfill for historical bets and ongoing update
        function for hourly DAG.
      interfaces:
        - "compute_real_closing_price(ticker, market_close_time_utc, sport, home_team, away_team) -> Optional[float]"
        - "backfill_real_clv() -> Dict[str, int] (updated, null_count, stale_count)"
        - "update_real_closing_lines() -> int (count updated)"
    - component: "bet_tracker.py fix"
      responsibility: |
        Modify _calculate_closing_probability to first attempt real closing price
        from game_odds, falling back to binary outcome only when no snapshot exists.
      interfaces:
        - "_calculate_closing_probability(market_result, side, ticker, market_close_time_utc, sport, home_team, away_team) -> Optional[float]"
    - component: "P&L Diagnostic (pnl_diagnostic.py)"
      responsibility: |
        Full diagnostic pipeline — Elo replay, timing analysis, bootstrap significance
        testing, portfolio optimizer replay, and auto-pause recommendations. Writes
        results to diagnostic_results table. Per-sport processing with 50-bet minimum.
      interfaces:
        - "run_diagnostic() -> Dict"
        - "replay_elo_ratings(sport) -> Dict[str, float]"
        - "compare_replay_vs_csv(sport, replayed_ratings) -> float"
        - "recalculate_bet_metrics(sport, replayed_ratings) -> pd.DataFrame"
        - "compute_timing_analysis(bets_df) -> Dict"
        - "what_if_timing_replay(bets_df, max_hours) -> Dict"
        - "bootstrap_pnl_test(profits, n_bootstrap) -> Dict"
        - "generate_recommendation(sport, roi, real_clv, bootstrap_result) -> str"
        - "replay_portfolio_optimizer(sport, bets_df, replayed_ratings) -> Dict"
        - "write_results_to_db(results) -> bool"
        - "print_diagnostic_report(results) -> None"
    - component: "Schema (database_schema_manager.py)"
      responsibility: "Add diagnostic_results table DDL to unified table definitions."
      interfaces:
        - "diagnostic_results table with sport, run_date composite index"
    - component: "DAG Integration (bet_sync_hourly.py)"
      responsibility: |
        Add update_closing_lines task after sync_bets_from_kalshi in hourly DAG.
        Fault-tolerant — CLV failures must not block bet syncing.
      interfaces:
        - "update_closing_lines PythonOperator task in bet_sync_hourly DAG"
  dependencies:
    - component: "pnl_diagnostic.py"
      relationship: "Calls compute_real_closing_price from clv_tracker.py; calls create_elo_instance from elo/factory.py; calls filter_opportunities and calculate_portfolio_allocation from portfolio_optimizer.py; uses default_db from db_manager.py"
    - component: "clv_tracker.py"
      relationship: "Uses default_db from db_manager.py; queries unified_games and game_odds tables"
    - component: "bet_tracker.py"
      relationship: "Calls compute_real_closing_price from clv_tracker.py in _calculate_closing_probability"
    - component: "bet_sync_hourly.py"
      relationship: "Calls update_real_closing_lines from clv_tracker.py"
  integration_points:
    - "clv_tracker.compute_real_closing_price integrates with game_odds and unified_games tables"
    - "bet_tracker._calculate_closing_probability calls clv_tracker.compute_real_closing_price"
    - "pnl_diagnostic.run_diagnostic calls clv_tracker.backfill_real_clv for historical fix"
    - "bet_sync_hourly DAG calls clv_tracker.update_real_closing_lines after bet sync"
    - "database_schema_manager.initialize_schema creates diagnostic_results table on startup"

