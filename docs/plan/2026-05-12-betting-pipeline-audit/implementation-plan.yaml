  - id: risk-control-hardening
    title: Implement evidence-qualified portfolio risk controls and exposure truth
    description: |
      Harden portfolio sizing and approval logic so it uses reconciled open exposure, same-match
      conflict state, concentration state, and approval-grade evidence inputs before approving
      bets. This task must keep current heuristics descriptive unless approval-grade CLV,
      calibration, and walk-forward evidence exists, and must make operator-visible rejection
      reasons available for blocked or downgraded bets.
    wave: 5
    agent: gem-implementer
    priority: high
    status: done
    dependencies:
      - evidence-linkage-exposure-contracts
      - sport-validation-state-publication
      - probability-pipeline-hardening
      - pricing-execution-lineage-hardening
    parallelizable: false
    conflicts_with:
      - pricing-execution-lineage-hardening
      - portfolio-drawdown-gate
    context_files:
      /mnt/data2/nhlstats/docs/plan/2026-05-12-betting-pipeline-audit/portfolio-risk-spec.md: Canonical contract for exposure truth, evidence-qualified sizing, and rejection conditions.
      /mnt/data2/nhlstats/plugins/portfolio_optimizer.py: Current sizing and allocation path with heuristic caps and no governed exposure-truth or concentration model.
      /mnt/data2/nhlstats/dashboard/data_layer.py: Current operator-facing portfolio semantics that must align with runtime exposure truth and rejection reasons.
    estimated_effort: large
    estimated_files: 3
    estimated_lines: 490
    focus_area: portfolio risk
    verification:
      - Live sizing subtracts governed open exposure and evaluates same-match conflict state before approval.
      - Rejection outputs distinguish missing evidence, contaminated evidence, concentration breaches, remaining-budget breaches, and existing-position conflicts.
      - Operator-facing exposure semantics align with runtime treatment of resting orders and executed-but-unsettled positions.
    acceptance_criteria:
      - Portfolio risk approval consumes governed probability and governed CLV evidence rather than descriptive metrics.
      - Exposure truth and rejection semantics are visible to both runtime and operator-facing consumers.
      - No bankroll, Kelly, threshold, or allocation relaxation can advance without CLV, calibration, and walk-forward approval support.
    failure_modes:
      - scenario: Risk controls still size against live bankroll without subtracting governed open exposure, leaving portfolio risk understated.
        likelihood: medium
        impact: critical
        mitigation: Require reconciliation tests that compare runtime budget math against governed exposure states.
      - scenario: Evidence-qualified rejection logic is implemented in runtime but not surfaced to operators, recreating governance ambiguity.
        likelihood: medium
        impact: high
        mitigation: Make operator-facing rejection fields part of the shared contract and verify them in read-model tests.
    tech_stack:
      - Python
      - PostgreSQL
      - Airflow
      - Streamlit read models
    test_coverage: Integration tests for exposure truth, same-match conflicts, concentration buckets, and evidence-qualified rejection logic.

  - id: portfolio-drawdown-gate
    title: Implement the portfolio-level drawdown and risk-of-ruin gate
    description: |
      Add the portfolio-level drawdown gate on top of the reconciled risk state so drawdown,
      concentration, and risk-of-ruin conditions can block approvals even when individual bets
      look strong. The gate must be portfolio-aware, operator-visible, and unable to be bypassed
      by shadow-only sports or strong single-sport descriptive metrics.
    wave: 6
    agent: gem-implementer
    priority: high
    status: done
    dependencies:
      - risk-control-hardening
    parallelizable: false
    conflicts_with:
      - risk-control-hardening
    context_files:
      /mnt/data2/nhlstats/docs/plan/2026-05-12-betting-pipeline-audit/portfolio-risk-spec.md: Defines required drawdown-state and portfolio-level safety semantics.
      /mnt/data2/nhlstats/plugins/portfolio_optimizer.py: Current sizing/allocation path where drawdown-aware gating is absent.
      /mnt/data2/nhlstats/dashboard/pages/portfolio.py: Operator surface that must show drawdown state and guardrail outcomes consistently with runtime.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 340
    focus_area: drawdown controls
    verification:
      - Drawdown and concentration state are evaluated before approval and exposed to the governed operator surface.
      - A strong single-sport recommendation cannot bypass the portfolio-level drawdown gate.
      - Tests cover drawdown-triggered rejection, shadow-only evidence, and portfolio-level remaining-budget behavior.
    acceptance_criteria:
      - Portfolio-level drawdown and risk-of-ruin semantics are implemented as governed gate outputs.
      - Runtime and reporting layers agree on drawdown state and related rejection reasons.
      - The gate blocks unsafe approvals without introducing undocumented threshold semantics.
    failure_modes:
      - scenario: Drawdown state is computed for reporting but not enforced at approval time.
        likelihood: medium
        impact: high
        mitigation: Verify drawdown outcomes in the same approval path that emits final risk decisions.
      - scenario: Drawdown guardrails depend on descriptive-only evidence and accidentally relax portfolio safety for shadow-only sports.
        likelihood: low
        impact: critical
        mitigation: Reuse evidence-qualified gate inputs from risk-control-hardening and fail closed on missing approval evidence.
    tech_stack:
      - Python
      - PostgreSQL
      - Pytest
    test_coverage: Portfolio-level integration coverage for drawdown, concentration, and evidence-qualified blocking behavior.

