      The runtime must consume sport-specific calibrated or governed probability artifacts when
      approved, emit explicit abstentions when artifacts or validation prerequisites are absent,
      and prevent blocked or shadow-only sports from appearing as sizing-eligible. This task
      hardens probability source selection, calibration lineage visibility, and fail-closed
      behavior without approving any threshold or bankroll change.
