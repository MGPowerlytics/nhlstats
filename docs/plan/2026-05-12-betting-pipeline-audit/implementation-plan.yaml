      /mnt/data2/nhlstats/plugins/odds_comparator.py: Current edge, market-probability, and best-price logic that must be split into governed price roles.
      /mnt/data2/nhlstats/plugins/clv_tracker.py: Current real-price CLV backfill path and stale-close handling that needs governed persistence.
