tasks:
  - id: governed-readmodel-versioning-foundation
    title: Introduce versioned governed read models without mutating dashboard v1 contracts
    description: |
      Introduce new versioned governed read models for approval-facing evidence, runtime
      gating, and operator review without mutating existing dashboard_*_v1 semantics in
      place. This task establishes the single canonical migration path, read-model names,
      and base sport/cohort/provenance/approval-state columns that later governed evidence
      work will extend. Current dashboard view contracts must remain preserved unless a later,
      explicit migration task supersedes them.
    wave: 1
    agent: gem-implementer
    priority: high
    status: done
    dependencies: []
    parallelizable: true
    conflicts_with: []
    context_files:
      /mnt/data2/nhlstats/docs/plan/2026-05-12-betting-pipeline-audit/evidence-readmodel-spec.md: Canonical field-level contract for lineage, provenance, CLV, validation, and exposure state.
      /mnt/data2/nhlstats/docs/plan/2026-05-12-betting-pipeline-audit/pipeline-evidence-map.md: Current broken joins and source-of-truth gaps that the new contract must close.
      /mnt/data2/nhlstats/migrations/stats_schema/V008__create_dashboard_read_model_views.sql: Existing dashboard view boundary that must remain stable while new governed read models are introduced alongside it.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 240
    focus_area: read-model versioning
    verification:
      - New versioned governed read models exist alongside current dashboard_*_v1 views, with existing dashboard contracts unchanged.
      - Migration and contract ownership remain on one canonical path under migrations/stats_schema/ with no competing dashboard-only projections.
      - Downstream consumers can bind to governed surface names and base approval/provenance fields without page-local inference.
    acceptance_criteria:
      - A canonical versioned governed read-model surface exists for later recommendation, execution, CLV, validation, and portfolio-risk consumers.
      - The architectural decision to add new governed read models instead of mutating dashboard_*_v1 semantics is explicit in the implementation boundary.
      - Existing dashboard_*_v1 contracts remain preserved during this cycle.
    failure_modes:
      - scenario: Existing dashboard_*_v1 views are mutated in place and silently break current consumers.
        likelihood: medium
        impact: high
        mitigation: Add compatibility checks that existing dashboard_*_v1 contracts remain unchanged while new governed models are introduced separately.
      - scenario: New governed views are introduced without single-owner migration governance, creating competing read-model contracts.
        likelihood: medium
        impact: high
        mitigation: Keep one canonical versioned read-model path and avoid parallel ad hoc dashboard-only projections.
    tech_stack:
      - Python
      - PostgreSQL
      - Airflow
      - Streamlit read models
    test_coverage: Contract tests plus targeted SQL/read-model integration tests for versioned governed-surface creation and dashboard_*_v1 compatibility preservation.

