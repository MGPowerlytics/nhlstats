      /mnt/data2/nhlstats/docs/plan/2026-05-12-betting-pipeline-audit/validation-evidence-audit.md: Documents approval-grade blockers, contamination sources, and baseline sport states.
      /mnt/data2/nhlstats/tests/contracts/schemas/: Canonical location for governed contract schema assets and consumer/provider compatibility tests.
