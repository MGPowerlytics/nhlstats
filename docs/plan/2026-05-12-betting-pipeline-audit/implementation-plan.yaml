plan_id: 2026-05-12-betting-pipeline-audit
objective: >
  Execute the deferred betting-pipeline backlog as governed runtime work by hardening
  probability, pricing, CLV, portfolio-risk, validation, drawdown, and operator-facing
  evidence paths without approving any bankroll sizing or threshold change unless CLV,
  calibration, and walk-forward evidence are simultaneously reviewable and approval-grade.
created_at: 2026-05-12T00:00:00Z
created_by: gem-planner
status: complete
research_confidence: high

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 27
  risk_score: high

tldr: |
  This implementation plan converts the completed audit/spec package into executable runtime
  work. Wave 1 establishes a new versioned governed read-model boundary alongside preserved
  dashboard_*_v1 contracts and defines the sport-validation contract assets that later runtime
  changes must consume. Wave 2 adds governed evidence linkage/exposure semantics and publishes
  sport validation states. Wave 3 hardens governed probability and pricing roles in parallel.
  Wave 4 wires executable-price and CLV lineage persistence. Wave 5 applies evidence-qualified
  portfolio risk controls, followed by a dedicated portfolio drawdown gate. The final waves
  update durable runtime docs, validate operator-facing surfaces, and perform a final
  governance review. No bankroll, Kelly, confidence, edge, max-risk, threshold, or allocation
  change may be approved unless CLV, calibration, and walk-forward evidence all pass together.

open_questions:
  - Whether the current placed-bet persistence path can carry all required selected-close provenance without introducing a new evidence table.

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Runtime hardening promotes sports or sizing behavior using descriptive or contaminated evidence rather than approval-grade evidence.
      likelihood: medium
      impact: critical
      mitigation: Make every eligibility and sizing gate fail closed on missing CLV, calibration, or walk-forward evidence, and surface contamination reasons directly in runtime/read-model outputs.
    - scenario: Pricing and probability semantics diverge across runtime, persistence, and dashboard surfaces, recreating the audit drift in a new form.
      likelihood: high
      impact: high
      mitigation: Land shared evidence/read-model contracts first, require contract tests at task boundaries, and block final review until operator surfaces consume the same governed fields as runtime.
    - scenario: Exposure truth remains understated because executed-but-unsettled risk, same-match conflicts, or drawdown state are not incorporated before sizing.
      likelihood: medium
      impact: critical
      mitigation: Sequence exposure-truth hardening before drawdown gating and require portfolio-risk verification against both runtime and reporting semantics.
    - scenario: Legacy binary-result CLV or synthetic/backfilled identifiers leak into approval-facing metrics.
      likelihood: high
      impact: high
      mitigation: Explicitly persist CLV source type, close-selection lineage, and contamination flags; treat contaminated cohorts as non-qualifying in every downstream gate.
  assumptions:
    - PostgreSQL remains the system of record for governed runtime evidence and operator-facing review surfaces.
    - The completed audit/spec package is the canonical source of truth for contracts, evidence states, and sequencing decisions in this cycle.
    - The goal of this cycle is runtime hardening and governed observability, not parameter increases or threshold relaxation.

implementation_specification:
  code_structure: >
    Implement the backlog around governed boundaries instead of one-off fixes. The runtime DAG,
    persistence layer, and dashboard/read-model layer should all consume the same sport-aware
    evidence state, quote lineage, probability provenance, CLV provenance, portfolio-risk state,
    and rejection semantics. Introduce new versioned governed read models for approval-facing
    evidence instead of mutating existing dashboard_*_v1 semantics in place, and preserve
    current dashboard view contracts unless a later explicit migration step supersedes them.
    Prefer versioned PostgreSQL-backed read models and contract-tested plugin boundaries over
    dashboard-only logic or file-only artifacts.
  affected_areas:
    - dags/multi_sport_betting_workflow.py
    - plugins/probability_calibration.py
    - plugins/odds_comparator.py
    - plugins/clv_tracker.py
    - plugins/update_clv_data.py
    - plugins/bet_loader.py
    - plugins/portfolio_betting.py
    - plugins/portfolio_optimizer.py
    - plugins/kalshi_betting.py
    - dashboard/data_layer.py
    - dashboard/pages/calibration.py
    - dashboard/pages/portfolio.py
    - dashboard/pages/bet_detail.py
    - migrations/stats_schema/
    - tests/contracts/schemas/
    - tests/contracts/
  component_details:
    - component: Governed evidence/read-model layer
      responsibility: Provide canonical sport-aware lineage, provenance, freshness, exposure, and contamination fields on new versioned governed read models shared by runtime and operator-facing consumers while preserving existing dashboard_*_v1 contracts.
      interfaces:
        - GovernedEvidenceRecord v1
        - RecommendationExecutionLink v1
        - OperatorEvidenceSurface v1
    - component: Sport validation framework
      responsibility: Publish per-sport blocked, shadow_only, candidate, and approval-grade readiness states with parity and contamination reasons.
      interfaces:
        - SportValidationState v1
        - ValidationEligibilityMatrix v1
    - component: Governed probability pipeline
      responsibility: Enforce sport-specific probability source, calibration provenance, abstention behavior, and fail-closed eligibility consumption in runtime paths.
      interfaces:
        - GovernedProbabilityDecision v1
        - CalibrationArtifactLineage v1
    - component: Pricing and CLV governance layer
      responsibility: Separate reference, executable, best, and close price roles and persist entry/close lineage needed for approval-grade CLV review.
      interfaces:
        - PriceRoleDecision v1
        - CLVEvidenceEnvelope v1
    - component: Portfolio risk controls
      responsibility: Reconcile exposure truth, same-match conflicts, concentration state, and evidence-qualified rejection logic before bet approval.
      interfaces:
        - PortfolioRiskState v1
        - RiskRejectionAudit v1
    - component: Drawdown gate
      responsibility: Add portfolio-level drawdown and risk-of-ruin gating that cannot be bypassed by strong single-sport evidence.
      interfaces:
        - DrawdownGateState v1
        - PortfolioGuardrailDecision v1
    - component: Runtime documentation and release gate
      responsibility: Keep durable docs, operator pages, browser validation, and final review aligned to implemented runtime behavior only.
      interfaces:
        - RuntimeGovernanceRunbook v1
        - FinalApprovalChecklist v1
  dependencies:
    - component: Governed evidence/read-model layer
      relationship: Upstream dependency for sport validation, governed probability, pricing lineage persistence, and portfolio-risk observability.
    - component: Sport validation framework
      relationship: Produces the evidence-state contract consumed by probability, pricing labels, and risk gates.
    - component: Governed probability pipeline
      relationship: Supplies approval-aware probability source and calibration lineage to the portfolio-risk gate.
    - component: Pricing and CLV governance layer
      relationship: Supplies executable entry price, close selection, freshness, and contamination outcomes to risk and drawdown controls.
    - component: Portfolio risk controls
      relationship: Supplies reconciled exposure truth and rejection semantics required by the drawdown gate and final operator review.
    - component: Runtime documentation and release gate
      relationship: Can finalize only after runtime, reporting, and validation surfaces prove parity with governed contracts.
  integration_points:
    - Airflow orchestration and recommendation/sizing flow in dags/multi_sport_betting_workflow.py
    - PostgreSQL migration and read-model boundaries under migrations/stats_schema/
    - Pricing, execution, and CLV plugins under plugins/
    - Portfolio risk and placement controls under plugins/portfolio_optimizer.py, plugins/portfolio_betting.py, and plugins/kalshi_betting.py
    - Dashboard data-layer and operator pages for calibration, portfolio, and bet detail
    - Contract, integration, and UI validation tests under tests/contracts/ and dashboard test coverage

