        impact: high
        mitigation: Add runtime/reporting parity checks and integration tests at the consuming boundary.
    tech_stack:
      - Python
      - Airflow
      - PostgreSQL
      - Pytest
    test_coverage: Runtime integration tests plus contract tests for probability source selection, abstentions, and validation-state parity.

