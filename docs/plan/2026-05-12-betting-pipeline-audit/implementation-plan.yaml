      /mnt/data2/nhlstats/plugins/probability_calibration.py: Existing calibration loader and selected-cohort logic that must be governed or blocked.
    estimated_effort: large
    estimated_files: 3
    estimated_lines: 440
    focus_area: governed probability
    verification:
      - Runtime consumers expose the same probability source, calibration artifact lineage, and abstention state that reporting surfaces show.
      - Blocked sports fail closed, shadow-only sports remain non-eligible for sizing, and approval-grade promotion is impossible without validation-state support.
      - Tests cover MLB/TENNIS governed or shadow logic, EPL/LIGUE1 parity constraints, and blocked baseline sports.
    acceptance_criteria:
      - Governed probability selection follows the source, fallback, and abstention rules defined per sport in the spec.
