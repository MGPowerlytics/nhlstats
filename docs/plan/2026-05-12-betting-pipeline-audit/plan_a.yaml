      plugins/update_clv_data.py: Alternate CLV implementation currently tied to closed-market outcomes.
      dashboard/data_layer.py: Downstream consumer of CLV and performance read models.
    estimated_effort: large
    estimated_files: 3
    estimated_lines: 440
    focus_area: CLV governance
    verification:
      - Prove only one CLV definition is used by runtime, validation, and dashboard consumers.
