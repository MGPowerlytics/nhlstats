    acceptance_criteria:
      - CLVQualityEvidence v1 is derived from one canonical closing-price source contract.
      - Historical data quality is tiered so compromised binary-result backfills cannot qualify a sport for eligibility.
      - CLV metrics are consumable by runtime gate logic and operator dashboards, not just reports.
    failure_modes:
      - scenario: The system keeps two CLV paths and operators cannot tell which one gates eligibility.
        likelihood: high
        impact: critical
        mitigation: Delete split semantics at the contract level and force all consumers onto one published CLV interface.
      - scenario: Clean and compromised historical windows are combined, overstating long-term edge quality.
        likelihood: medium
        impact: high
        mitigation: Publish explicit evidence-quality tiers and require clean-window thresholds for approval.
    tech_stack:
      - Python
      - PostgreSQL
      - pytest
    test_coverage: Contract tests for closing-price sourcing, regression tests for CLV calculations, and quality-tier validation against historical cohorts.

