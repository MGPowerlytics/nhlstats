    estimated_effort: large
    estimated_files: 3
    estimated_lines: 460
    focus_area: pricing and execution
    verification:
      - Prove selector outputs use normalized fair odds and best executable price rather than a Kalshi-only shortcut.
      - Prove quote freshness and bookmaker provenance persist into downstream CLV and audit consumers.
    acceptance_criteria:
