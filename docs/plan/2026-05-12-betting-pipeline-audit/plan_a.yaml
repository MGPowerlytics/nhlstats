      - pandas
      - PostgreSQL
      - pytest
    test_coverage: Unit and contract tests for quote normalization, de-vig calculations, bookmaker selection, and live selector regression cases.

  - id: canonical-clv-pipeline
    title: Canonicalize CLV computation and approval evidence
    description: |
      Collapse the split CLV implementations into a single governed pipeline tied to the
      normalized quote contract. Closing prices, quality tiers, and clean historical
      windows must be defined consistently so CLV becomes an approval input for thresholds
      and sizing rather than a passive report. Historical contamination from older binary
      backfills must be isolated instead of mixed into governed evidence.
