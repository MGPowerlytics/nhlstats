      WNCAAB, and TENNIS from ingestion and rating updates through market normalization,
      opportunity selection, sizing, execution, settlement, and dashboard reporting.
      The output must identify the exact PostgreSQL evidence sources, missing joins,
      and where the current live DAG diverges from the strongest-governed sports.
    wave: 1
    agent: gem-researcher
    priority: high
    status: pending
    dependencies: []
    parallelizable: true
    conflicts_with: []
    context_files:
      dags/multi_sport_betting_workflow.py: Primary multi-sport live workflow and task sequencing.
      plugins/bet_loader.py: Recommendation persistence and downstream runtime payload boundary.
      plugins/bet_tracker.py: Fill, settlement, and placed-bet evidence flow into PostgreSQL.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 180
    focus_area: pipeline audit
    verification:
      - Confirm each sport has a traced path from model output to realized outcome evidence.
      - Confirm the inventory identifies the source-of-truth PostgreSQL tables or views for each stage.
    acceptance_criteria:
      - The audit matrix covers all supported sports and all five PRD audit dimensions.
