tasks:
  - id: evidence-gate-contract-spec
    title: Define the governed evidence bundle and sizing-change gate
    description: |
      Create the canonical governance contract that every sport must satisfy before any
      Kelly, bankroll, threshold, confidence-floor, or segment-exclusion change can move
      beyond shadow mode. The contract must explicitly require CLV, calibration, and
      walk-forward evidence, plus cohort provenance, bias labels, drawdown context,
      and blocked/shadow/eligible approval states.
    wave: 1
    agent: gem-planner
    priority: high
    status: pending
    dependencies: []
    parallelizable: true
    conflicts_with: []
    context_files:
      docs/prd.yaml: Source-of-truth scope, acceptance criteria, and no-code-change boundary for this round.
      dags/multi_sport_betting_workflow.py: Current live orchestration and hard-coded threshold/sizing insertion points.
      plugins/constants.py: Shared thresholds and bookmaker constants likely to become governed config.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 220
    focus_area: governance contracts
    verification:
      - Confirm the contract names every in-scope sport and every required audit dimension.
      - Confirm the approval logic blocks any future sizing change without CLV, calibration, and walk-forward evidence.
    acceptance_criteria:
      - EvidenceBundle v1 specifies required fields, provenance, quality flags, approval windows, and blocked/shadow/eligible states.
      - The contract clearly separates evidence required for model calibration, market pricing, CLV, and portfolio-risk approval.
      - The output is implementation-ready and does not itself change live parameters.
    failure_modes:
      - scenario: The contract is too generic and fails to encode sport-specific evidence exceptions such as EPL three-way markets.
        likelihood: medium
        impact: high
        mitigation: Include sport overrides only as explicit schema fields, not hidden runtime assumptions.
      - scenario: Governance focuses on ROI alone and omits drawdown or quality-tier requirements.
        likelihood: medium
        impact: high
        mitigation: Make drawdown, concentration, evidence quality, and cohort provenance required fields in the base contract.

