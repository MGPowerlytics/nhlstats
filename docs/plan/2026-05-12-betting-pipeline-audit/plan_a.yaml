        impact: high
        mitigation: Replace ad hoc probability derivations with one canonical normalized-quote interface consumed everywhere.
      - scenario: Best execution favors a quote without timestamp quality, creating phantom edge and bad CLV.
        likelihood: medium
        impact: high
        mitigation: Make freshness thresholds and provenance mandatory parts of the quote contract.
    tech_stack:
