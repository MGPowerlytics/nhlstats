      Introduce a canonical pricing layer that de-vigs multi-book quotes, fixes the
      current best-price parser bug, and separates reference pricing from execution venue.
      The live selector should stop behaving as if Kalshi pricing alone defines edge when
      other books are already being ingested, and every quote should carry freshness and
      bookmaker provenance for later CLV and audit use.
