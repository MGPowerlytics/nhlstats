plan_id: 2026-05-12-betting-pipeline-audit
variant: a
objective: >
  Audit and then safely upgrade the multi-sport betting pipeline so future execution can
  maximize long-term ROI with controlled drawdowns, while enforcing a hard governance rule:
  no future Kelly, bankroll, threshold, or segment-sizing change is eligible unless CLV,
  calibration, and walk-forward evidence all pass sport-specific approval gates.
created_at: 2026-05-12T00:00:00Z
created_by: gem-planner
status: pending_approval
research_confidence: medium

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 36
  risk_score: high

tldr: |
  This plan treats the current system as an evidence-governed control problem, not just a
  model-tuning problem. Wave 1 establishes the canonical evidence contract and traces the
  current live pipeline, PostgreSQL evidence, and parameter drift across NBA, NHL, MLB, NFL,
  EPL, LIGUE1, NCAAB, WNCAAB, and TENNIS. Wave 2 upgrades the probability, pricing, CLV,
  and portfolio-risk layers around governed interfaces. Later waves wire runtime approval
  gates, dashboard read models, validation/review, and operator documentation so no sizing
  change can bypass CLV + calibration + walk-forward evidence.

open_questions:
  - Whether NCAAB and WNCAAB have enough unbiased historical quote history to support governed calibration and CLV gates without shadow-only fallback.
  - Whether current timestamp granularity in game_odds and placed_bets is sufficient to attribute execution quality versus simple pre-close CLV by sport.
  - Whether any non-soccer sport will require multi-outcome market support beyond binary home/away contracts during the governed rollout.

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Selection-biased training cohorts make calibration appear better than live reality, causing premature eligibility for sizing changes.
      likelihood: high
      impact: critical
      mitigation: Require cohort provenance, placed-bet versus recommendation separation, bias flags, and shadow-mode approval before any sport becomes eligible.
    - scenario: De-vig and best-execution logic diverge between research and the live DAG, producing inconsistent edge, CLV, and sizing decisions.
      likelihood: high
      impact: high
      mitigation: Introduce one canonical normalized-quote and fair-odds contract consumed by selector, CLV, validation, and dashboard layers.
    - scenario: Portfolio risk stays understated because correlated exposures, stale dashboard read models, or fill timing gaps are not reflected in live controls.
      likelihood: medium
      impact: critical
      mitigation: Add a shared portfolio-risk state contract, force exposure truth reconciliation, and block sizing eligibility until drawdown and concentration evidence is available.
    - scenario: Historical CLV and backtest evidence remain contaminated by legacy binary-result backfills, leading to false approval decisions.
      likelihood: medium
      impact: high
      mitigation: Tier evidence quality, isolate compromised cohorts, and require walk-forward approval on clean windows before any governed change can advance.
  assumptions:
    - PostgreSQL remains the authoritative source of truth for games, odds, recommendations, placed bets, fills, settlements, and audit evidence.
    - MLB and TENNIS provide the strongest existing governance patterns and should be reused where valid, but not blindly generalized across other sports.
    - This round is plan-only; no production sizing, model, migration, or live parameter changes are approved until follow-on execution completes and passes review.

implementation_specification:
  code_structure: >
    Preserve the current DAG as the orchestration shell, but factor future work around
    governed interfaces: sport-specific calibrated probability artifacts, normalized market
    quotes with fair-odds derivation, canonical CLV evidence, portfolio-risk state, runtime
    gate evaluation, and dashboard read models. PostgreSQL-backed contracts should be the
    canonical interchange layer so research, live runtime, and observability consume the same
    evidence objects.
  affected_areas:
    - dags/multi_sport_betting_workflow.py
    - plugins/probability_calibration.py
    - plugins/elo/epl_ensemble_adapter.py
    - plugins/the_odds_api.py
    - plugins/odds_comparator.py
    - plugins/opportunity_loader.py
    - plugins/clv_tracker.py
    - plugins/update_clv_data.py
    - plugins/portfolio_optimizer.py
    - plugins/portfolio_betting.py
    - plugins/bet_loader.py
    - dashboard/data_layer.py
    - dashboard/pages/calibration.py
    - dashboard/pages/portfolio.py
    - tests/contracts/schemas/
  component_details:
    - component: Evidence bundle registry
      responsibility: Define the fields, provenance rules, approval states, and bias annotations required before any sizing-related change is allowed.
      interfaces:
        - EvidenceBundle v1
        - GovernedSizingChangePolicy v1
        - ApprovalState {blocked, shadow, eligible}
    - component: Calibrated probability layer
      responsibility: Produce sport-specific, bias-aware calibrated probabilities and expose calibration quality evidence suitable for runtime gating and dashboard review.
      interfaces:
        - CalibratedProbabilityArtifact v1
        - SportCalibrationMetrics v1
    - component: Market pricing and execution layer
      responsibility: Normalize multi-book quotes, compute fair odds, separate reference pricing from execution venue, and persist freshness/provenance for later CLV analysis.
      interfaces:
        - NormalizedQuote v1
        - FairOddsSnapshot v1
        - ExecutionPriceDecision v1
    - component: CLV evidence service
      responsibility: Compute one canonical CLV signal, grade evidence quality, and publish per-sport approval metrics for thresholds and sizing governance.
      interfaces:
        - CLVQualityEvidence v1
        - ClosingPriceSourceAudit v1
    - component: Portfolio risk state
      responsibility: Quantify bankroll allocation, concentration, cross-sport correlation, drawdown, and risk-of-ruin signals consumed by the live gate and dashboard.
      interfaces:
        - PortfolioRiskState v1
        - ExposureTruthReconciliation v1
    - component: Governance observability layer
      responsibility: Surface sport-specific evidence, eligibility state, exposure truth, and execution quality to operators and reviewers.
      interfaces:
        - DashboardGovernancePayload v1
        - GateDecisionAudit v1
  dependencies:
    - component: Calibrated probability layer
      relationship: Must satisfy Evidence bundle registry requirements before runtime gate evaluation can consume its outputs.
    - component: Market pricing and execution layer
      relationship: Produces normalized quote and fair-odds artifacts used by CLV evidence and opportunity selection.
    - component: CLV evidence service
      relationship: Consumes normalized quotes and placed bet/fill records, then feeds approval metrics into portfolio risk and runtime gates.
    - component: Portfolio risk state
      relationship: Consumes governed probabilities, CLV evidence, and live exposure data to determine whether sizing decisions remain eligible.
    - component: Governance observability layer
      relationship: Reads approval, pricing, CLV, and risk artifacts from PostgreSQL-backed contracts for operator visibility and verification.
  integration_points:
    - Airflow DAG task boundaries in dags/multi_sport_betting_workflow.py
    - PostgreSQL tables and views backing unified_games, game_odds, bet_recommendations, placed_bets, fills, and dashboard read models
    - Dashboard pages for calibration, portfolio, and operator-facing governance states
    - Contract tests and smoke tests that keep research, runtime, and observability aligned

