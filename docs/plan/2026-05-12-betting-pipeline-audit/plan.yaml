    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 180
    focus_area: validation governance
    verification:
      - Confirm every supported sport is assigned an evidence-quality status and leakage-risk note.
      - Confirm the audit separates placed-bet evidence from recommendation-only and synthetic/backfill evidence.
    acceptance_criteria:
      - The output defines approval-grade evidence requirements for CLV, calibration, and walk-forward validation.
      - Contaminated or weak evidence sources are explicitly tagged for exclusion or shadow-only treatment in future rounds.
      - The deliverable remains audit-only and does not execute backtest redesign or retuning work.
    failure_modes:
      - scenario: Historical backfills and clean windows are mixed, overstating evidence quality.
        likelihood: medium
        impact: high
        mitigation: Require explicit evidence tiers and contamination flags by cohort.
      - scenario: Validation quality is inferred from isolated backtests rather than repeatable standards.
        likelihood: medium
        impact: high
        mitigation: Require leakage, windowing, and parity checks in the audit rubric.

  - id: runtime-config-drift-audit
    title: Audit runtime parameter drift and operator-facing evidence gaps
    description: |
      Reconcile current runtime thresholds, confidence filters, exclusions, bankroll controls,
      and operator-facing dashboard semantics so the follow-on roadmap can distinguish governed
      controls from undocumented heuristics. The output must remain descriptive and planning-only.
    wave: 1
