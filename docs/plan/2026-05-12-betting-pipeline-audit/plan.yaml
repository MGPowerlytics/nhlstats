plan_id: 2026-05-12-betting-pipeline-audit
objective: >
  Deliver a PRD-compliant audit-and-planning package for the multi-sport betting pipeline
  that inventories the end-to-end workflow, evaluates evidence quality across all supported
  sports, defines governed audit/spec contracts for later implementation, and defers all
  production changes to a non-executable follow-on backlog.
created_at: 2026-05-12T00:00:00Z
created_by: gem-planner
status: completed
research_confidence: medium

plan_metrics:
  wave_1_task_count: 6
  total_dependencies: 22
  risk_score: medium

tldr: |
  This revision keeps the current round strictly inside the PRD boundary: audit, specification,
  and phased implementation planning only. Wave 1 inventories the live multi-sport pipeline,
  PostgreSQL evidence, probability/calibration quality, pricing/CLV behavior, bankroll/risk
  controls, validation quality, and runtime/documentation drift across NBA, NHL, MLB, NFL,
  EPL, LIGUE1, NCAAB, WNCAAB, and TENNIS. Wave 2 converts those findings into governed
  probability, pricing/CLV, portfolio-risk, and evidence-read-model specifications that are
  implementation-ready but non-executable in this round. Wave 3 packages the prioritized
  follow-on execution roadmap and approval-readiness review, while keeping all runtime-hardening
  work in a deferred future backlog outside current approval scope.

open_questions:
  - Whether current PostgreSQL timestamps and audit fields are sufficient to attribute realized CLV and execution timing by sport without additional future instrumentation.
  - Whether any weaker-coverage sports should remain permanently shadow-only until unbiased walk-forward windows and clean closing-line history are available.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: The audit package drifts back into implementation commitments, violating the PRD and making the plan unapprovable again.
      likelihood: medium
      impact: critical
      mitigation: Keep executable tasks limited to research, specification, roadmap synthesis, and plan review; move all runtime work into deferred follow-on backlog items.
    - scenario: Cross-sport differences are flattened into one generic summary, leaving follow-on execution without sport-specific evidence gates.
      likelihood: medium
      impact: high
      mitigation: Require every audit and spec task to produce sport-by-sport outputs covering all supported sports and each PRD audit dimension.
    - scenario: The follow-on roadmap omits dependencies between probability, pricing, CLV, risk, and evidence-read-model work, causing unsafe sequencing later.
      likelihood: medium
      impact: high
      mitigation: Make contracts and dependency declarations explicit between audit outputs, specification tasks, and deferred implementation backlog items.
  assumptions:
    - PostgreSQL remains the system of record for audit evidence and current-state pipeline truth.
    - This round must not include production code changes, migrations, retuning, or live parameter updates.
    - The strongest value of this round is a prioritized, dependency-aware follow-on plan with verification gates tied to CLV, calibration, and walk-forward evidence.

implementation_specification:
  code_structure: >
    This round produces an audit-and-spec package rather than code changes. Deliverables should
    be organized as traceable audit matrices, governed specification documents, and a phased
    follow-on execution roadmap that future implementation waves can consume without revisiting
    scope, dependencies, or verification gates.
  affected_areas:
    - dags/multi_sport_betting_workflow.py
    - plugins/odds_comparator.py
    - plugins/probability_calibration.py
    - plugins/the_odds_api.py
    - plugins/clv_tracker.py
    - plugins/update_clv_data.py
    - plugins/portfolio_optimizer.py
    - plugins/portfolio_betting.py
    - plugins/bet_loader.py
    - dashboard/data_layer.py
    - dashboard/pages/calibration.py
    - docs/plan/2026-05-12-betting-pipeline-audit/plan.yaml
  component_details:
    - component: Pipeline evidence inventory
      responsibility: Trace ingestion, modeling, pricing, recommendation, sizing, execution, settlement, and reporting evidence paths for every supported sport.
      interfaces:
        - Sport-by-stage pipeline evidence matrix
        - PostgreSQL source-of-truth inventory
    - component: Probability and validation governance specification
      responsibility: Define how probability sources, calibration evidence, eligibility tiers, and walk-forward requirements must be described before follow-on implementation begins.
      interfaces:
        - Governed probability specification
        - Sport evidence tier matrix
    - component: Pricing and CLV governance specification
      responsibility: Define canonical fair-odds, price freshness, best-price, closing-line, and CLV audit rules for future implementation.
      interfaces:
        - Pricing and CLV governance specification
        - Canonical pricing evidence contract
    - component: Portfolio risk governance specification
      responsibility: Define concentration, correlation, drawdown, exposure-truth, and sizing-evidence gates for later execution waves.
      interfaces:
        - Portfolio risk governance specification
        - Evidence-qualified sizing gate definition
    - component: Follow-on execution roadmap
      responsibility: Convert audit and specification outputs into a phased, dependency-aware backlog that is clearly outside current approval scope.
      interfaces:
        - Prioritized follow-on execution roadmap
        - Deferred implementation backlog
  dependencies:
    - component: Pipeline evidence inventory
      relationship: Feeds every downstream specification by identifying actual producer/consumer boundaries and PostgreSQL evidence sources.
    - component: Probability and validation governance specification
      relationship: Consumes pipeline, calibration, and validation audits before later implementation can define eligibility behavior.
    - component: Pricing and CLV governance specification
      relationship: Consumes pipeline, pricing, and validation audits before later implementation can unify pricing and CLV behavior.
    - component: Portfolio risk governance specification
      relationship: Consumes pipeline, bankroll/risk, validation, and drift audits before later implementation can govern sizing and exposure logic.
    - component: Follow-on execution roadmap
      relationship: Consumes all audit and specification outputs and converts them into future execution phases with explicit dependencies and gates.
  integration_points:
    - Airflow orchestration in dags/multi_sport_betting_workflow.py
    - PostgreSQL-backed evidence across games, odds, recommendations, bets, fills, settlements, and dashboard read models
    - Dashboard data consumers that present calibration, exposure, and performance evidence
    - Follow-on execution planning for probability, pricing, CLV, and risk-control implementation waves

