      - Confirm the specification is sport-aware and can distinguish blocked, shadow, and candidate evidence states.
    acceptance_criteria:
      - The spec defines the evidence fields needed to trace end-to-end pipeline behavior in PostgreSQL.
      - The spec supports future dashboard and audit consumers without requiring implementation this round.
      - The deliverable remains planning-only and does not create migrations or live views.
    failure_modes:
      - scenario: The spec stays too high-level and cannot guide later implementation or review.
        likelihood: medium
        impact: high
        mitigation: Require concrete field groups, producer/consumer notes, and evidence provenance requirements.
      - scenario: Read-model requirements ignore portfolio-level evidence and focus only on model outputs.
        likelihood: medium
        impact: medium
        mitigation: Require exposure, drawdown, and settlement evidence in the base contract.
    task_type: documentation
    audience: developers
    coverage_matrix:
      - Game and odds lineage fields
      - Recommendation and placed-bet evidence fields
      - Calibration and CLV evidence fields
      - Portfolio-risk and settlement evidence fields

  - id: follow-on-execution-roadmap
    title: Produce the prioritized follow-on execution roadmap and deferred backlog
    description: |
      Synthesize the audit and specification outputs into a phased execution roadmap that
      orders later implementation work, declares explicit dependencies, defines verification
      gates, and keeps all runtime changes outside the current approval scope. This task is
      the bridge from audit/spec outputs to later execution, not execution itself.
    wave: 3
    agent: gem-documentation-writer
    priority: high
    status: done
    dependencies:
      - governed-probability-spec
      - pricing-clv-governance-spec
      - portfolio-risk-spec
      - evidence-readmodel-spec
      - validation-evidence-audit
      - runtime-config-drift-audit
    parallelizable: false
    conflicts_with: []
    context_files:
      docs/prd.yaml: Source-of-truth scope and no-code-change decision.
      docs/plan/2026-05-12-betting-pipeline-audit/plan.yaml: Canonical plan being revised.
      dags/multi_sport_betting_workflow.py: Current runtime orchestration context for later phases.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 240
    focus_area: execution planning
    verification:
      - Confirm every deferred implementation item has explicit prerequisites and verification gates.
      - Confirm the roadmap separates current approval scope from follow-on execution scope.
    acceptance_criteria:
      - The roadmap is prioritized, dependency-aware, and directly consumable by later execution waves.
      - Deferred implementation intent is moved into a clearly labeled non-executable backlog.
      - The deliverable contains no approved runtime changes for this round.
    failure_modes:
      - scenario: Deferred implementation items leak back into executable current-wave tasks.
        likelihood: medium
        impact: high
        mitigation: Keep all implementation items in a separate future_backlog section with explicit out-of-scope labeling.
      - scenario: Dependencies are under-specified, causing unsafe parallelization in later rounds.
        likelihood: medium
        impact: high
        mitigation: Require prerequisite lists and verification gates for each deferred execution item.
    task_type: documentation
    audience: stakeholders
    coverage_matrix:
      - Prioritized implementation phases
      - Explicit prerequisites and contracts
      - Verification gates for later execution
      - Non-executable deferred backlog

  - id: approval-readiness-review
    title: Review the audit-and-planning package for PRD and dependency compliance
    description: |
      Review the revised plan package to confirm that executable tasks remain audit/spec/planning
      only, all dependencies and conflicts are coherent, every task is execution-ready for a
      future loop, and deferred implementation work is clearly outside current approval scope.
    wave: 3
    agent: gem-reviewer
    priority: medium
    status: done
    dependencies:
      - follow-on-execution-roadmap
    parallelizable: false
    conflicts_with: []
    context_files:
      docs/prd.yaml: Approval boundary and acceptance criteria.
      docs/plan/2026-05-12-betting-pipeline-audit/plan.yaml: Revised canonical plan.
      AGENTS.md: Repository-level planning and contract conventions.
    estimated_effort: small
    estimated_files: 3
    estimated_lines: 140
    focus_area: approval readiness
    verification:
      - Confirm no executable task performs implementation, migration, retuning, or live parameter work.
      - Confirm all tasks include verification steps, acceptance criteria, dependencies, and line estimates.
    acceptance_criteria:
      - The package is review-ready as an audit-and-planning deliverable.
      - Reviewer findings on scope, hidden dependencies, and missing task details are all closed.
      - Any remaining future implementation intent is deferred outside current-wave scope.
    failure_modes:
      - scenario: A hidden dependency remains in the roadmap or spec sequencing.
        likelihood: low
        impact: high
        mitigation: Require the review to cross-check every contract producer/consumer pair against task dependencies.
      - scenario: The package still implies executable runtime changes in the current round.
        likelihood: low
        impact: high
        mitigation: Require explicit PRD scope review against every wave and deferred backlog item.
    requires_review: true
    review_depth: standard
    review_security_sensitive: false

future_backlog:
  approval_scope: deferred_outside_current_round
  execution_rule: Non-executable in this audit-and-planning round; eligible only after plan approval and a later implementation cycle.
  items:
    - id: probability-pipeline-hardening
      title: Implement governed probability and calibration wiring
      summary: Future runtime work to apply the governed probability specification to live selection and persistence paths.
      prerequisites:
        - governed-probability-spec
        - evidence-readmodel-spec
        - approval-readiness-review
      verification_gates:
        - Contract coverage proves sport-specific probability artifacts or explicit blocked/shadow states.
        - Runtime consumers and reporting surfaces use the same governed probability semantics.
    - id: pricing-execution-hardening
      title: Implement canonical pricing, fair-odds, and CLV behavior
      summary: Future runtime work to unify pricing and CLV logic under the approved pricing/clv specification.
      prerequisites:
        - pricing-clv-governance-spec
        - evidence-readmodel-spec
        - approval-readiness-review
      verification_gates:
        - Reference pricing, executable pricing, and closing-line evidence are contract-aligned.
        - Split CLV implementations are removed or explicitly superseded.
    - id: risk-control-hardening
      title: Implement evidence-qualified portfolio risk controls
      summary: Future runtime work to align live sizing, concentration, and exposure handling with the approved portfolio-risk specification.
      prerequisites:
        - portfolio-risk-spec
        - pricing-clv-governance-spec
        - approval-readiness-review
      verification_gates:
        - Portfolio-level concentration, drawdown, and exposure-truth evidence are available.
        - No bankroll, Kelly, or threshold change can advance without CLV, calibration, and walk-forward support.
    - id: sport-validation-framework
      title: Implement governed sport-by-sport validation outputs
      summary: Future validation work to operationalize per-sport approval evidence and parity checks from the audit package.
      prerequisites:
        - governed-probability-spec
        - pricing-clv-governance-spec
        - evidence-readmodel-spec
      verification_gates:
        - Supported sports emit comparable evidence-tier outputs.
        - Blocked, shadow-only, and candidate states are testable and visible.
    - id: portfolio-drawdown-gate
      title: Implement portfolio-level drawdown and risk-of-ruin gating
      summary: Future runtime and reporting work to operationalize portfolio-level guardrails once evidence and risk contracts exist.
      prerequisites:
        - portfolio-risk-spec
        - evidence-readmodel-spec
        - sport-validation-framework
      verification_gates:
        - Drawdown, concentration, and risk-of-ruin evidence align across runtime and reporting layers.
        - Unsafe parameter recommendations are blocked even when single-sport metrics appear strong.
    - id: runtime-docs-and-final-gate
      title: Align durable documentation with approved runtime behavior
      summary: Future documentation and rollout work after implementation is complete and verified.
      prerequisites:
        - probability-pipeline-hardening
        - pricing-execution-hardening
        - risk-control-hardening
        - portfolio-drawdown-gate
      verification_gates:
        - Durable docs reflect implemented behavior rather than planned behavior.
        - Final approval package includes evidence-backed eligibility states and blocked recommendations.
