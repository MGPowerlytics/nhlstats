tasks:
  - id: pipeline-evidence-map
    title: Map the live multi-sport pipeline and PostgreSQL evidence trail
    description: |
      Trace all supported sports from ingestion through Elo/model generation, market
      normalization, recommendation persistence, sizing, execution, settlement, CLV refresh,
      and dashboard surfacing. The output must identify the current PostgreSQL source of truth,
      missing links, duplicate paths, and cross-sport divergence points without proposing or
      performing runtime changes.
    wave: 1
    agent: gem-researcher
    priority: high
    status: done
    dependencies: []
    parallelizable: true
    conflicts_with: []
    context_files:
      dags/multi_sport_betting_workflow.py: Current end-to-end orchestration path.
      plugins/bet_loader.py: Recommendation persistence boundary.
      dashboard/data_layer.py: Downstream evidence consumption path.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 180
    focus_area: pipeline audit
    verification:
      - Confirm every supported sport is traced from upstream inputs through realized outcomes.
      - Confirm each pipeline stage is tied to named PostgreSQL tables, views, or persisted evidence objects.
    acceptance_criteria:
      - The audit matrix covers NBA, NHL, MLB, NFL, EPL, LIGUE1, NCAAB, WNCAAB, and TENNIS.
      - The output identifies live-versus-reporting divergence and missing evidence joins.
      - The deliverable is descriptive only and contains no implementation commitments.
    failure_modes:
      - scenario: The audit treats all sports as sharing one path and misses sport-specific branches.
        likelihood: medium
        impact: high
        mitigation: Require a sport-by-sport matrix rather than a single merged narrative.
      - scenario: Evidence sources are inferred loosely and not anchored to actual persisted artifacts.
        likelihood: medium
        impact: high
        mitigation: Require named producer/consumer boundaries and PostgreSQL evidence references for every stage.

  - id: probability-calibration-audit
    title: Audit per-sport probability generation and calibration evidence
    description: |
      Inventory live probability sources by sport, verify which calibration artifacts are
      actually wired into current behavior, and assess sample quality, leakage risk, selection
      bias, and production-to-research parity. The output must distinguish descriptive model
      behavior from evidence strong enough to inform future gating decisions.
    wave: 1
    agent: gem-researcher
    priority: high
    status: done
    dependencies: []
    parallelizable: true
    conflicts_with: []
    context_files:
      plugins/odds_comparator.py: Current probability consumer in selection logic.
      plugins/probability_calibration.py: Calibration artifact generation and loading path.
      dashboard/pages/calibration.py: Operator-facing calibration evidence presentation.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 190
    focus_area: probability evidence
    verification:
      - Confirm each supported sport has an explicit probability-source and calibration-status entry.
      - Confirm the audit distinguishes production-wired evidence from offline-only artifacts.
    acceptance_criteria:
      - The output grades calibration evidence quality, leakage risk, and selection bias by sport.
      - The output identifies which sports are blocked, shadow-only, or candidates for later eligibility.
      - The deliverable remains audit-only and does not prescribe live model changes for this round.
    failure_modes:
      - scenario: Offline calibration artifacts are mistaken for live-wired evidence.
        likelihood: medium
        impact: high
        mitigation: Require explicit live consumer confirmation for every claimed artifact.
      - scenario: Evidence quality is summarized without separating placed-bet, recommendation, and synthetic cohorts.
        likelihood: high
        impact: high
        mitigation: Require cohort provenance and bias labels in the audit output.

  - id: pricing-clv-audit
    title: Audit market pricing, fair-odds assumptions, and CLV control surfaces
    description: |
      Review market-feed usage, price freshness assumptions, normalization behavior, best-price
      selection, closing-line sourcing, and CLV calculation paths across the live pipeline and
      reporting surfaces. The output must separate current descriptive metrics from evidence and
      controls that could later support governed recommendations.
    wave: 1
    agent: gem-researcher
    priority: high
    status: done
    dependencies: []
    parallelizable: true
    conflicts_with: []
    context_files:
      plugins/the_odds_api.py: Supporting market-feed and best-price ingestion logic.
      plugins/odds_comparator.py: Edge calculation and opportunity selection path.
      plugins/clv_tracker.py: Current CLV evidence path.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 190
    focus_area: pricing and clv audit
    verification:
      - Confirm the audit identifies every current fair-odds, best-price, and CLV computation path.
      - Confirm the audit records freshness, provenance, and closing-line assumptions for each path.
    acceptance_criteria:
      - The deliverable documents split implementations and their downstream consumers.
      - The output identifies where price quality is strong enough for audit evidence versus only descriptive reporting.
      - The deliverable contains no runtime bug fixes or production hardening work.
    failure_modes:
      - scenario: One CLV path is omitted, hiding downstream inconsistency.
        likelihood: medium
        impact: high
        mitigation: Require a producer/consumer map for every pricing and CLV calculation path.
      - scenario: Kalshi and supporting-book roles are not separated, obscuring execution-quality conclusions.
        likelihood: medium
        impact: medium
        mitigation: Require source-role labeling for reference pricing, executable pricing, and closing-line evidence.

  - id: bankroll-risk-audit
    title: Audit bankroll sizing, concentration, and exposure reconciliation
    description: |
      Inventory current Kelly settings, caps, confidence filters, segment exclusions, concentration
      handling, cross-sport allocation assumptions, and live-versus-dashboard exposure behavior.
      The output must show where current controls are evidence-backed, heuristic, or missing.
    wave: 1
    agent: gem-researcher
    priority: high
    status: done
    dependencies: []
    parallelizable: true
    conflicts_with: []
    context_files:
      plugins/portfolio_optimizer.py: Current sizing and allocation logic.
      plugins/portfolio_betting.py: Placement and bankroll update behavior.
      dags/multi_sport_betting_workflow.py: Runtime orchestration and gating entry points.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 180
    focus_area: bankroll and risk audit
    verification:
      - Confirm all current sizing controls and exposure views are cataloged with code owners and evidence inputs.
      - Confirm the audit identifies cross-sport and same-slate concentration blind spots.
    acceptance_criteria:
      - The output documents bankroll, Kelly, cap, concentration, and drawdown control surfaces.
      - The output explicitly covers portfolio-level behavior, not just single-bet logic.
      - The deliverable does not recommend live parameter increases without evidence.
    failure_modes:
      - scenario: The audit focuses on single-bet Kelly logic and misses portfolio-level exposure behavior.
        likelihood: medium
        impact: high
        mitigation: Require concentration, correlation, and drawdown sections in the audit output.
      - scenario: Dashboard exposure is assumed to match runtime exposure without reconciliation.
        likelihood: medium
        impact: high
        mitigation: Require explicit live-versus-dashboard exposure comparison and mismatch logging.

  - id: validation-evidence-audit
    title: Audit walk-forward, backtest, and evidence-quality governance
    description: |
      Assess current backtesting, walk-forward validation, leakage controls, historical replay
      quality, and research-to-production parity across all supported sports. The output must
      define which evidence is approval-grade, descriptive-only, contaminated, or missing.
