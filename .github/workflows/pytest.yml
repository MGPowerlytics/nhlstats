name: pytest

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  collection-smoke:
    name: collection-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest collection smoke
        run: pytest --collect-only -q

  default-pytest:
    name: default-pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EPL contract suite
        run: pytest -q tests/contracts

      - name: Run default pytest
        run: pytest -q
